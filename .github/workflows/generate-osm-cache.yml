name: "Generate OSM Cache (Nationwide)"

# ═══════════════════════════════════════════════════════════════
#  CrashLens — OSM Road + POI Cache for All 51 States
#
#  26 balanced batches: each pairs a large state with a small one.
#  Max 2 states per batch. All timeouts = 360 min (GitHub max).
#  "nationwide" runs ALL 26 in parallel (~2-3 hr wall clock).
# ═══════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 5 1-7 * 5'     # 1st Friday of each month

  workflow_dispatch:
    inputs:
      scope:
        description: 'What to generate'
        required: true
        type: choice
        default: 'nationwide'
        options:
          - nationwide
          - single-state
          - batch01
          - batch02
          - batch03
          - batch04
          - batch05
          - batch06
          - batch07
          - batch08
          - batch09
          - batch10
          - batch11
          - batch12
          - batch13
          - batch14
          - batch15
          - batch16
          - batch17
          - batch18
          - batch19
          - batch20
          - batch21
          - batch22
          - batch23
          - batch24
          - batch25
          - batch26
      single_state:
        description: 'State abbreviation (only for single-state)'
        required: false
        default: ''
      force_regenerate:
        description: '⚠️  Force regenerate (re-downloads ALL — slow!)'
        required: false
        type: boolean
        default: false

env:
  R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
  R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: "crash-lens-data"

# ═══════════════════════════════════════════════════════════════
#  BATCH PLAN: 26 batches, 2 states each (big + small balanced)
#  batch01: TX DC
#  batch02: CA RI
#  batch03: NY DE
#  batch04: FL VT
#  batch05: PA NH
#  batch06: IL CT
#  batch07: OH HI
#  batch08: GA WV
#  batch09: MI ME
#  batch10: NC SD
#  batch11: VA WY
#  batch12: TN ND
#  batch13: MO NE
#  batch14: AL KS
#  batch15: WA NJ
#  batch16: OR MD
#  batch17: AZ MA
#  batch18: MN SC
#  batch19: CO KY
#  batch20: WI IN
#  batch21: OK IA
#  batch22: LA NV
#  batch23: MS UT
#  batch24: AR NM
#  batch25: AK MT
#  batch26: ID
# ═══════════════════════════════════════════════════════════════

jobs:

  batch01:
    if: github.event_name == 'schedule' || github.event.inputs.scope == 'nationwide' || github.event.inputs.scope == 'batch01'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install osmnx geopandas pandas pyarrow scipy boto3
      - name: "batch01: TX DC"
        run: |
          FORCE=""; [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_osm_data.py --state tx dc $FORCE
      - if: always()
        run: echo "### batch01 — TX DC" >> $GITHUB_STEP_SUMMARY && ls -lh cache/*.gz 2>/dev/null >> $GITHUB_STEP_SUMMARY || true

  batch02:
