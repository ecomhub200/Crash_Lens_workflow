name: "Generate OSM Cache (Nationwide)"

# ═══════════════════════════════════════════════════════════════
#  CrashLens — OSM Road + POI Cache for All 51 States
#
#  Each state runs as its own job — 51 parallel jobs.
#  Job names = state names for easy debugging.
#  All timeouts = 360 min (GitHub Actions maximum).
#  "nationwide" runs ALL 51 in parallel.
# ═══════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 5 1-7 * 5'     # 1st Friday of each month

  workflow_dispatch:
    inputs:
      scope:
        description: 'What to generate'
        required: true
        type: choice
        default: 'nationwide'
        options:
          - nationwide
          - single-state
          - al
          - ak
          - az
          - ar
          - ca
          - co
          - ct
          - de
          - dc
          - fl
          - ga
          - hi
          - id
          - il
          - in
          - ia
          - ks
          - ky
          - la
          - me
          - md
          - ma
          - mi
          - mn
          - ms
          - mo
          - mt
          - ne
          - nv
          - nh
          - nj
          - nm
          - ny
          - nc
          - nd
          - oh
          - ok
          - or
          - pa
          - ri
          - sc
          - sd
          - tn
          - tx
          - ut
          - vt
          - va
          - wa
          - wv
          - wi
          - wy
      single_state:
        description: 'State abbreviation (only for single-state scope)'
        required: false
        default: ''
      force_regenerate:
        description: '⚠️  Force regenerate (re-downloads ALL — slow!)'
        required: false
        type: boolean
        default: false

env:
  R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
  R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: "crash-lens-data"

jobs:

  alabama:
    if: github.event_name == 'schedule' || github.event.inputs.scope == 'nationwide' || github.event.inputs.scope == 'al'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install osmnx geopandas pandas pyarrow scipy boto3
      - name: "Alabama (AL)"
        run: |
          FORCE=""; [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_osm_data.py --state al $FORCE
      - if: always()
        run: echo "### Alabama (AL)" >> $GITHUB_STEP_SUMMARY && ls -lh cache/*.gz 2>/dev/null >> $GITHUB_STEP_SUMMARY || true

  alaska:
    if: github.event_name == 'schedule' || github.event.inputs.scope == 'nationwide' || github.event.inputs.scope == 'ak'
