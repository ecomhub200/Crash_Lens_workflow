name: "Generate OSM Cache (Nationwide)"

# ═══════════════════════════════════════════════════════════════
#  CrashLens — OSM Road + POI Cache Generator for All 51 States
#
#  19 batches, max 3 states each. TX and CA get solo jobs.
#  All timeouts set to 360 min (GitHub Actions maximum).
#  Auto-skip: existing R2 files skipped unless force checked.
#  Public repo = unlimited free minutes.
#
#  MANUAL: "nationwide" runs ALL 19 in parallel (~2-3 hr)
# ═══════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 5 1-7 * 5'     # 1st Friday of each month, 5 AM UTC

  workflow_dispatch:
    inputs:
      scope:
        description: 'What to generate'
        required: true
        type: choice
        default: 'nationwide'
        options:
          - nationwide
          - single-state
          - batch01-tiny1
          - batch02-tiny2
          - batch03-small1
          - batch04-small2
          - batch05-smed1
          - batch06-smed2
          - batch07-med1
          - batch08-med2
          - batch09-med3
          - batch10-med4
          - batch11-mlrg1
          - batch12-mlrg2
          - batch13-large1
          - batch14-large2
          - batch15-large3
          - batch16-large4
          - batch17-xl
          - batch18-tx
          - batch19-ca
      single_state:
        description: 'State abbreviation (only for single-state)'
        required: false
        default: ''
      force_regenerate:
        description: '⚠️ Force regenerate (re-downloads ALL — slow! Leave unchecked for normal use)'
        required: false
        type: boolean
        default: false

env:
  R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
  R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: "crash-lens-data"

# ═══════════════════════════════════════════════════════════════
#  19 BATCHES — max 3 states each, TX/CA solo
#
#  01: DE RI DC       02: CT NH VT       03: HI WV ME
#  04: SD WY ND       05: NJ MD MA       06: SC KY NE
#  07: IN IA KS       08: NM MT ID       09: NV UT CO
#  10: WI MN OK       11: OR WA AZ       12: AR LA MS
#  13: VA OH TN       14: MO AL NC       15: GA MI
#  16: IL PA          17: NY FL AK       18: TX    19: CA
# ═══════════════════════════════════════════════════════════════

jobs:

  batch01-tiny1:
    if: github.event_name == 'schedule' || github.event.inputs.scope == 'nationwide' || github.event.inputs.scope == 'batch01-tiny1'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install osmnx geopandas pandas pyarrow scipy boto3
      - name: "Batch 01: DE RI DC"
        run: |
          FORCE=""; [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_osm_data.py --state de ri dc $FORCE
      - if: always()
        run: echo "### Batch 01 — DE RI DC" >> $GITHUB_STEP_SUMMARY && ls -lh cache/*.gz 2>/dev/null >> $GITHUB_STEP_SUMMARY || true

  batch02-tiny2:
    if: github.event_name == 'schedule' || github.event.inputs.scope == 'nationwide' || github.event.inputs.scope == 'batch02-tiny2'
