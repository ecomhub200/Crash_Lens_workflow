# .github/workflows/generate-osm-cache.yml
# Universal: Download OSM road network for ANY registered state → parquet cache → R2
# Run manually from Actions tab → "Generate OSM Cache" → pick state(s) → Run
#
# Supports:
#   - Single state:  pick from dropdown
#   - All states:    pick "ALL" to generate cache for every registered state
#
# Thin wrapper over `generate_osm_data.py` — same script used by the
# "Generate OSM Cache (Delaware)" workflow. The nationwide variant
# "OSM: Nationwide Download" uses `osm_county_download.py` instead
# (county-by-county, for large states).
#
# All three workflows produce the same output schema including the
# `streets_per_node` column (added 2026-04-12 for FHWA MIRE-correct
# intersection classification).

name: Generate OSM Cache

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'State to cache (or ALL for every registered state)'
        required: true
        default: 'delaware'
        type: choice
        options:
          - delaware
          - virginia
          - colorado
          - maryland
          - florida
          - new_york
          - california
          - texas
          - ALL
      force_regenerate:
        description: '⚠️ Force regenerate (re-downloads ALL files — slow! Leave unchecked for normal use)'
        required: false
        type: boolean
        default: false

env:
  R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
  R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: "crash-lens-data"

jobs:
  resolve:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - id: build
        run: |
          python3 -c "
          import json

          # ── Master state registry ──
          # Add new states here — everything else is automatic.
          STATES = {
              'delaware':   {'name': 'Delaware',     'abbreviation': 'de', 'r2_prefix': 'delaware'},
              'virginia':   {'name': 'Virginia',     'abbreviation': 'va', 'r2_prefix': 'virginia'},
              'colorado':   {'name': 'Colorado',     'abbreviation': 'co', 'r2_prefix': 'colorado'},
              'maryland':   {'name': 'Maryland',     'abbreviation': 'md', 'r2_prefix': 'maryland'},
              'florida':    {'name': 'Florida',      'abbreviation': 'fl', 'r2_prefix': 'florida'},
              'new_york':   {'name': 'New York',     'abbreviation': 'ny', 'r2_prefix': 'new_york'},
              'california': {'name': 'California',   'abbreviation': 'ca', 'r2_prefix': 'california'},
              'texas':      {'name': 'Texas',        'abbreviation': 'tx', 'r2_prefix': 'texas'},
          }

          selected = '${{ github.event.inputs.state }}'

          if selected == 'ALL':
              matrix = list(STATES.values())
          else:
              if selected not in STATES:
                  raise ValueError(f'{selected} not in registry. Add it to the workflow.')
              matrix = [STATES[selected]]

          print(json.dumps({'include': matrix}))
          " > matrix.json

          echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT

  generate:
    needs: resolve
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}
      fail-fast: false
      max-parallel: 2

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install osmnx geopandas pandas pyarrow scipy boto3

      - name: "Generate ${{ matrix.name }} roads + intersections + POIs"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          # generate_osm_data.py produces:
          #   cache/{abbr}_roads.parquet.gz
          #   cache/{abbr}_intersections.parquet.gz  (includes streets_per_node)
          #   cache/{abbr}_pois.parquet.gz
          # and self-uploads to R2 using the R2_* env vars above.
          python generate_osm_data.py --state ${{ matrix.abbreviation }} $FORCE

      - name: Summary
        if: always()
        run: |
          ABBR="${{ matrix.abbreviation }}"
          PREFIX="${{ matrix.r2_prefix }}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## OSM Cache — ${{ matrix.name }} (${ABBR})

          Generated by \`generate_osm_data.py --state ${ABBR}\` (same script as
          the Delaware-specific workflow). Output includes \`streets_per_node\`
          for MIRE-correct intersection classification.

          \`\`\`
          $(ls -lh cache/${ABBR}_*.gz 2>/dev/null || echo "No files generated")
          \`\`\`

          Expected R2 keys:
          - ${PREFIX}/cache/${ABBR}_roads.parquet.gz
          - ${PREFIX}/cache/${ABBR}_intersections.parquet.gz
          - ${PREFIX}/cache/${ABBR}_pois.parquet.gz
          EOF
