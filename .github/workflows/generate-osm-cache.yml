name: "Generate OSM Cache (Nationwide)"

# ═══════════════════════════════════════════════════════════════
#  CrashLens — OSM Road + POI Cache Generator for All 51 States
#  
#  SCHEDULE: 1st Friday of each month, staggered batches:
#    Batch 1:  12:00 AM EST (small states)     ~1-2 hr
#    Batch 2:   6:00 AM EST (medium states)    ~2-3 hr
#    Batch 3:  12:00 PM EST (large states)     ~3-5 hr
#    Batch 4:   6:00 PM EST (western states)   ~2-3 hr
#    Batch 5:  12:00 AM EST Sat (remaining)    ~1-2 hr
#
#  Each batch has a 6-hour window before the next starts.
#  Auto-skip: states already in R2 are skipped (unless force).
#  Public repo = unlimited free GitHub Actions minutes.
#
#  MANUAL: Select "nationwide" to run ALL 5 batches in parallel,
#  or pick individual batch / single state.
# ═══════════════════════════════════════════════════════════════

on:
  schedule:
    # 1st Friday of each month (days 1-7 + Friday)
    # Staggered 6 hours apart to stay within GitHub 6hr job limit
    - cron: '0 5 1-7 * 5'     # Batch 1: 12:00 AM EST = 5:00 AM UTC (Friday)
    - cron: '0 11 1-7 * 5'    # Batch 2:  6:00 AM EST = 11:00 AM UTC (Friday)
    - cron: '0 17 1-7 * 5'    # Batch 3: 12:00 PM EST = 5:00 PM UTC (Friday)
    - cron: '0 23 1-7 * 5'    # Batch 4:  6:00 PM EST = 11:00 PM UTC (Friday)
    - cron: '0 5 2-8 * 6'     # Batch 5: 12:00 AM EST = 5:00 AM UTC (Saturday)

  workflow_dispatch:
    inputs:
      scope:
        description: 'What to generate'
        required: true
        type: choice
        default: 'nationwide'
        options:
          - nationwide
          - single-state
          - batch1-small
          - batch2-medium
          - batch3-large
          - batch4-west
          - batch5-remaining
      single_state:
        description: 'State abbreviation (only for single-state)'
        required: false
        default: ''
      force_regenerate:
        description: 'Force regenerate (overwrite existing R2 cache)'
        required: false
        type: boolean
        default: false

# ═══════════════════════════════════════════════════════════════
#  BATCH ASSIGNMENT (51 states split by download time)
#
#  Batch 1 — Small (11 states, ~1-2 hr):
#    DE RI CT DC NH VT HI WV ME SD WY
#
#  Batch 2 — Medium (10 states, ~2-3 hr):
#    NJ MD MA IN IA KS NE ND SC KY
#
#  Batch 3 — Large (10 states, ~3-5 hr):
#    TX CA FL NY PA IL MI AL GA NC
#
#  Batch 4 — Western (10 states, ~2-3 hr):
#    AZ NM OR WA MT ID NV UT CO WI
#
#  Batch 5 — Remaining (10 states, ~2-3 hr):
#    VA OH TN MO MN MS AR LA OK AK
# ═══════════════════════════════════════════════════════════════

env:
  R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
  R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: "crash-lens-data"

jobs:

  # ─────────────────────────────────────────────────────────────
  #  BATCH 1 — Small states | Schedule: Friday 12:00 AM EST
  #  DE RI CT DC NH VT HI WV ME SD WY
  # ─────────────────────────────────────────────────────────────
  batch1-small:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 5 1-7 * 5') ||
      github.event.inputs.scope == 'nationwide' ||
      github.event.inputs.scope == 'batch1-small'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install osmnx geopandas pandas pyarrow scipy boto3

      - name: "Batch 1: Small states (DE RI CT DC NH VT HI WV ME SD WY)"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_osm_data.py --state de ri ct dc nh vt hi wv me sd wy $FORCE

      - name: Summary
        if: always()
        run: |
          echo "### Batch 1 — Small States (Friday 12 AM EST)" >> $GITHUB_STEP_SUMMARY
          echo "DE RI CT DC NH VT HI WV ME SD WY" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh cache/*.gz 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No files generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  #  BATCH 2 — Medium states | Schedule: Friday 6:00 AM EST
  #  NJ MD MA IN IA KS NE ND SC KY
  # ─────────────────────────────────────────────────────────────
  batch2-medium:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 11 1-7 * 5') ||
      github.event.inputs.scope == 'nationwide' ||
      github.event.inputs.scope == 'batch2-medium'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install osmnx geopandas pandas pyarrow scipy boto3

      - name: "Batch 2: Medium states (NJ MD MA IN IA KS NE ND SC KY)"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_osm_data.py --state nj md ma in ia ks ne nd sc ky $FORCE

      - name: Summary
        if: always()
        run: |
          echo "### Batch 2 — Medium States (Friday 6 AM EST)" >> $GITHUB_STEP_SUMMARY
          echo "NJ MD MA IN IA KS NE ND SC KY" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh cache/*.gz 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No files generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  #  BATCH 3 — Large states | Schedule: Friday 12:00 PM EST
  #  TX CA FL NY PA IL MI AL GA NC
  # ─────────────────────────────────────────────────────────────
  batch3-large:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 17 1-7 * 5') ||
      github.event.inputs.scope == 'nationwide' ||
      github.event.inputs.scope == 'batch3-large'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install osmnx geopandas pandas pyarrow scipy boto3

      - name: "Batch 3: Large states (TX CA FL NY PA IL MI AL GA NC)"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_osm_data.py --state tx ca fl ny pa il mi al ga nc $FORCE

      - name: Summary
        if: always()
        run: |
          echo "### Batch 3 — Large States (Friday 12 PM EST)" >> $GITHUB_STEP_SUMMARY
          echo "TX CA FL NY PA IL MI AL GA NC" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh cache/*.gz 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No files generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  #  BATCH 4 — Western states | Schedule: Friday 6:00 PM EST
  #  AZ NM OR WA MT ID NV UT CO WI
  # ─────────────────────────────────────────────────────────────
  batch4-west:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 23 1-7 * 5') ||
      github.event.inputs.scope == 'nationwide' ||
      github.event.inputs.scope == 'batch4-west'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install osmnx geopandas pandas pyarrow scipy boto3

      - name: "Batch 4: Western states (AZ NM OR WA MT ID NV UT CO WI)"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_osm_data.py --state az nm or wa mt id nv ut co wi $FORCE

      - name: Summary
        if: always()
        run: |
          echo "### Batch 4 — Western States (Friday 6 PM EST)" >> $GITHUB_STEP_SUMMARY
          echo "AZ NM OR WA MT ID NV UT CO WI" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh cache/*.gz 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No files generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  #  BATCH 5 — Remaining states | Schedule: Saturday 12:00 AM EST
  #  VA OH TN MO MN MS AR LA OK AK
  # ─────────────────────────────────────────────────────────────
  batch5-remaining:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 5 2-8 * 6') ||
      github.event.inputs.scope == 'nationwide' ||
      github.event.inputs.scope == 'batch5-remaining'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install osmnx geopandas pandas pyarrow scipy boto3

      - name: "Batch 5: Remaining states (VA OH TN MO MN MS AR LA OK AK)"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_osm_data.py --state va oh tn mo mn ms ar la ok ak $FORCE

      - name: Summary
        if: always()
        run: |
          echo "### Batch 5 — Remaining States (Saturday 12 AM EST)" >> $GITHUB_STEP_SUMMARY
          echo "VA OH TN MO MN MS AR LA OK AK" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh cache/*.gz 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No files generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────
  #  SINGLE STATE (manual only)
  # ─────────────────────────────────────────────────────────────
  single-state:
    if: github.event.inputs.scope == 'single-state' && github.event.inputs.single_state != ''
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install osmnx geopandas pandas pyarrow scipy boto3

      - name: "Generate: ${{ github.event.inputs.single_state }}"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_osm_data.py --state ${{ github.event.inputs.single_state }} $FORCE

      - name: Summary
        if: always()
        run: |
          echo "### Single State: ${{ github.event.inputs.single_state }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh cache/*.gz 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No files generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
