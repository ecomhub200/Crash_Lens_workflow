# ==============================================================================
# Mapillary Traffic Inventory — Statewide Automated Download
# ==============================================================================
# Downloads ALL traffic signs, signals, street lights from Mapillary API v4
# using adaptive tiling (0.03 grid, auto-subdivides to 0.009 on dense areas).
#
# PREREQUISITE: Add MAPILLARY_TOKEN secret (Settings > Secrets > Actions)
#   Get token at: https://www.mapillary.com/dashboard/developers
#
# SCALE:
#   Delaware:  ~1,175 tiles,  ~55K features,   ~5 min
#   Virginia:  ~27K tiles,   ~500K features,   ~90 min
#   Texas:     ~155K tiles,    ~2M features,   ~6 hours
# ==============================================================================

name: "Mapillary: Download Traffic Inventory"

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'State abbreviation to download'
        required: true
        type: choice
        options:
          - de
          - va
          - co
          - md
          - ct
          - fl
          - ga
          - il
          - ma
          - ny
          - nc
          - oh
          - pa
          - sc
          - tx
          - wa

      tile_size:
        description: 'Initial tile size (subdivides to 0.009 on dense tiles automatically)'
        required: false
        type: choice
        default: '0.03'
        options:
          - '0.01'
          - '0.02'
          - '0.03'
          - '0.05'

      force:
        description: 'Force re-download even if cache exists in R2'
        required: false
        type: boolean
        default: false

  schedule:
    - cron: '0 4 1 1,4,7,10 *'

permissions:
  contents: read

jobs:
  download:
    name: "Mapillary (${{ github.event.inputs.state || 'de' }})"
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas pyarrow requests awscli

      - name: Check existing R2 cache
        id: check
        if: github.event.inputs.force != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          STATE="${{ github.event.inputs.state || 'de' }}"
          R2="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"

          if aws s3 ls "s3://crash-lens-data/${STATE}/cache/${STATE}_mapillary.parquet.gz" \
              --endpoint-url "$R2" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Cache exists - use force=true to re-download"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No cache - will download"
          fi

      - name: Download Mapillary inventory
        id: download
        if: steps.check.outputs.exists != 'true' || github.event.inputs.force == 'true'
        env:
          MAPILLARY_TOKEN: ${{ secrets.MAPILLARY_TOKEN }}
        run: |
          STATE="${{ github.event.inputs.state || 'de' }}"
          TILE="${{ github.event.inputs.tile_size || '0.03' }}"

          if [ -z "$MAPILLARY_TOKEN" ]; then
            echo "::error::MAPILLARY_TOKEN secret not set"
            echo "Setup:"
            echo "  1. Go to https://www.mapillary.com/dashboard/developers"
            echo "  2. Copy your client token (MLY|...)"
            echo "  3. Repo > Settings > Secrets > Actions > New"
            echo "     Name: MAPILLARY_TOKEN"
            exit 1
          fi

          mkdir -p cache

          python generate_mapillary_data.py \
            --state "$STATE" \
            --token "$MAPILLARY_TOKEN" \
            --cache-dir cache \
            --tile-size "$TILE"

          if [ ! -f "cache/${STATE}_mapillary.parquet" ]; then
            echo "::error::Download failed - no output file"
            exit 1
          fi

          ROWS=$(python3 -c "import pandas as pd; print(len(pd.read_parquet('cache/${STATE}_mapillary.parquet')))")
          echo "features=$ROWS" >> $GITHUB_OUTPUT
          echo "Downloaded $ROWS features"

      - name: Upload to R2
        if: steps.download.outcome == 'success'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          STATE="${{ github.event.inputs.state || 'de' }}"
          R2="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"

          gzip -cn "cache/${STATE}_mapillary.parquet" > "cache/${STATE}_mapillary.parquet.gz"
          aws s3 cp "cache/${STATE}_mapillary.parquet.gz" \
            "s3://crash-lens-data/${STATE}/cache/${STATE}_mapillary.parquet.gz" \
            --endpoint-url "$R2" --only-show-errors

          if [ -f "cache/${STATE}_mapillary.csv" ]; then
            gzip -cn "cache/${STATE}_mapillary.csv" > "cache/${STATE}_mapillary.csv.gz"
            aws s3 cp "cache/${STATE}_mapillary.csv.gz" \
              "s3://crash-lens-data/${STATE}/cache/${STATE}_mapillary.csv.gz" \
              --endpoint-url "$R2" --only-show-errors
          fi

          SIZE=$(stat -c%s "cache/${STATE}_mapillary.parquet.gz" 2>/dev/null || echo "0")
          echo "Uploaded: ${STATE}/cache/${STATE}_mapillary.parquet.gz ($((SIZE / 1048576)) MB)"

      - name: Summary
        if: always()
        run: |
          STATE="${{ github.event.inputs.state || 'de' }}"
          FEATURES="${{ steps.download.outputs.features || 'skipped (cache exists)' }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Mapillary Traffic Inventory: ${STATE}

          | Detail | Value |
          |--------|-------|
          | State | ${STATE} |
          | Features | ${FEATURES} |
          | Tile Size | ${{ github.event.inputs.tile_size || '0.03' }} (adaptive to 0.009 on dense) |
          | R2 Path | ${STATE}/cache/${STATE}_mapillary.parquet.gz |
          EOF
