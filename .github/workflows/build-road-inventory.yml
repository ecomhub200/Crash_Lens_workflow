# ==============================================================================
# Build Statewide Road Database — Consolidates all cache files
# ==============================================================================
# Downloads all cache files from R2, runs spatial joins, outputs a single
# {abbr}_road_inventory.parquet.gz with 91 columns per road segment.
#
# INPUT:  {state}/cache/{abbr}_roads.parquet.gz (+ 8 other cache files)
# OUTPUT: {state}/cache/{abbr}_road_inventory.parquet.gz
# ==============================================================================

name: "Build Road Database"

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which states to build'
        required: true
        default: 'single_state'
        type: choice
        options:
          - single_state
          - nationwide

      state:
        description: 'State abbreviation (for single_state scope)'
        required: false
        default: 'de'
        type: choice
        options:
          - ak
          - al
          - ar
          - az
          - ca
          - co
          - ct
          - dc
          - de
          - fl
          - ga
          - hi
          - ia
          - id
          - il
          - in
          - ks
          - ky
          - la
          - ma
          - md
          - me
          - mi
          - mn
          - mo
          - ms
          - mt
          - nc
          - nd
          - ne
          - nh
          - nj
          - nm
          - nv
          - ny
          - oh
          - ok
          - or
          - pa
          - ri
          - sc
          - sd
          - tn
          - tx
          - ut
          - va
          - vt
          - wa
          - wi
          - wv
          - wy

      force:
        description: 'Force rebuild even if database exists in R2'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  R2_BUCKET: crash-lens-data

jobs:
  preflight:
    name: "Preflight"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      total: ${{ steps.matrix.outputs.total }}

    steps:
      - uses: actions/checkout@v5

      - name: Build state matrix
        id: matrix
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          R2="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          SCOPE="${{ github.event.inputs.scope || 'single_state' }}"
          FORCE="${{ github.event.inputs.force || 'false' }}"
          SINGLE="${{ github.event.inputs.state || 'de' }}"

          declare -A PREFIXES=(
            [al]=alabama [ak]=alaska [az]=arizona [ar]=arkansas [ca]=california
            [co]=colorado [ct]=connecticut [de]=delaware [dc]=district_of_columbia
            [fl]=florida [ga]=georgia [hi]=hawaii [id]=idaho [il]=illinois
            [in]=indiana [ia]=iowa [ks]=kansas [ky]=kentucky [la]=louisiana
            [me]=maine [md]=maryland [ma]=massachusetts [mi]=michigan [mn]=minnesota
            [ms]=mississippi [mo]=missouri [mt]=montana [ne]=nebraska [nv]=nevada
            [nh]=new_hampshire [nj]=new_jersey [nm]=new_mexico [ny]=new_york
            [nc]=north_carolina [nd]=north_dakota [oh]=ohio [ok]=oklahoma [or]=oregon
            [pa]=pennsylvania [ri]=rhode_island [sc]=south_carolina [sd]=south_dakota
            [tn]=tennessee [tx]=texas [ut]=utah [vt]=vermont [va]=virginia
            [wa]=washington [wv]=west_virginia [wi]=wisconsin [wy]=wyoming
          )

          if [ "$SCOPE" = "single_state" ]; then
            ALL_STATES="$SINGLE"
          else
            ALL_STATES="dc ri de ct nj nh vt ma md hi me wv sc nc ky ar ms al la ia ok ks ne nd sd wy nm id nv ut az co va oh pa il mi ga wi mn mo fl ny wa or tn tx ca ak in mt"
          fi

          NEEDED=""
          for STATE in $ALL_STATES; do
            PREFIX="${PREFIXES[$STATE]:-$STATE}"
            # Check if roads cache exists (prerequisite)
            if ! aws s3 ls "s3://${R2_BUCKET}/${PREFIX}/cache/${STATE}_roads.parquet.gz" \
                --endpoint-url "$R2" 2>/dev/null | grep -q parquet; then
              echo "Skipping $STATE — no roads cache"
              continue
            fi
            # Check if road_inventory already exists
            if [ "$FORCE" != "true" ] && aws s3 ls "s3://${R2_BUCKET}/${PREFIX}/cache/${STATE}_road_inventory.parquet.gz" \
                --endpoint-url "$R2" 2>/dev/null | grep -q parquet; then
              echo "Skipping $STATE — road_inventory already exists"
              continue
            fi
            NEEDED="$NEEDED $STATE"
          done

          NEEDED=$(echo $NEEDED | xargs)
          TOTAL=$(echo $NEEDED | wc -w)
          echo "States to build: $NEEDED ($TOTAL total)"

          if [ -z "$NEEDED" ]; then
            echo 'matrix={"state":[]}' >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          else
            JSON="["
            FIRST=true
            for STATE in $NEEDED; do
              if [ "$FIRST" = true ]; then FIRST=false; else JSON="$JSON,"; fi
              JSON="$JSON\"$STATE\""
            done
            JSON="$JSON]"
            echo "matrix={\"state\":$JSON}" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          fi

  build:
    name: "${{ matrix.state }}"
    needs: preflight
    if: needs.preflight.outputs.total != '0'
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      matrix: ${{ fromJson(needs.preflight.outputs.matrix) }}
      max-parallel: 5
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas pyarrow scipy numpy boto3 geopandas shapely

      - name: Download geography files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          R2="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p cache
          aws s3 cp "s3://crash-lens-data/_national/us_counties.json" cache/us_counties.json \
            --endpoint-url "$R2" 2>/dev/null || echo "us_counties.json not found"
          aws s3 cp "s3://crash-lens-data/_national/us_mpos.json" cache/us_mpos.json \
            --endpoint-url "$R2" 2>/dev/null || echo "us_mpos.json not found"

      - name: Restore boundary polygons from R2
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          R2="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          mkdir -p cache/boundaries
          for FILE in us_urban_area_boundaries.parquet.gz us_county_boundaries.parquet.gz; do
            aws s3 cp "s3://crash-lens-data/_national/boundaries/$FILE" "cache/boundaries/$FILE" \
              --endpoint-url "$R2" --only-show-errors 2>/dev/null && \
              echo "✅ $FILE" || echo "⚠️ $FILE not found"
          done

      - name: Build road database (${{ matrix.state }})
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET: crash-lens-data
        run: |
          mkdir -p cache
          python build_road_inventory.py \
            --state "${{ matrix.state }}" \
            --cache-dir cache \
            --upload

      - name: Job summary
        if: always()
        run: |
          STATE="${{ matrix.state }}"
          if [ -f "cache/${STATE}_road_inventory.parquet.gz" ]; then
            SIZE=$(stat -c%s "cache/${STATE}_road_inventory.parquet.gz" 2>/dev/null || echo "0")
            echo "## Road Database: ${STATE}" >> $GITHUB_STEP_SUMMARY
            echo "Size: $((SIZE / 1048576)) MB" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Road Database: ${STATE} — FAILED" >> $GITHUB_STEP_SUMMARY
          fi
