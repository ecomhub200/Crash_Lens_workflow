name: Supabase Sync
# Syncs crash data from R2 → self-hosted Supabase PostgreSQL
# Runs monthly or on-demand for any state

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month at 6 AM UTC
  workflow_dispatch:
    inputs:
      state:
        description: 'State abbreviation (de, va, co) or "all" for all active states'
        required: true
        default: 'de'
      dry_run:
        description: 'Dry run (validate without inserting)'
        required: false
        default: 'false'
        type: boolean

env:
  # R2 credentials (already in repo secrets)
  CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
  CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
  # Supabase credentials (add these to repo secrets)
  SUPABASE_DB_HOST: localhost
  SUPABASE_DB_PORT: '5432'
  SUPABASE_DB_NAME: postgres
  SUPABASE_DB_USER: postgres
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  # SSH tunnel
  SUPABASE_VPS_HOST: srv1503081.hstgr.cloud

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        # For scheduled runs, sync all active states
        # For manual runs, use the input state
        include:
          - state: ${{ github.event.inputs.state || 'de' }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas pyarrow psycopg2-binary boto3

      - name: Set up SSH tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SUPABASE_SSH_KEY }}" > ~/.ssh/supabase_tunnel
          chmod 600 ~/.ssh/supabase_tunnel
          
          # Add VPS to known hosts
          ssh-keyscan -H ${{ env.SUPABASE_VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          
          # Start SSH tunnel: forward local 5432 → VPS Supabase PostgreSQL
          ssh -f -N -L 5432:localhost:5433 \
            -i ~/.ssh/supabase_tunnel \
            root@${{ env.SUPABASE_VPS_HOST }} \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=3
          
          # Wait for tunnel to be ready
          sleep 3
          echo "SSH tunnel established"

      - name: Verify tunnel
        run: |
          # Test PostgreSQL connection through tunnel
          PGPASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }} psql \
            -h localhost -p 5432 -U postgres -d postgres \
            -c "SELECT COUNT(*) FROM states;" || {
            echo "❌ Cannot reach Supabase through SSH tunnel"
            exit 1
          }
          echo "✅ Supabase connection verified"

      - name: Determine states to sync
        id: states
        run: |
          STATE_INPUT="${{ matrix.state }}"
          if [ "$STATE_INPUT" = "all" ]; then
            # Sync all states that have data in R2
            echo "states=de va co" >> $GITHUB_OUTPUT
          else
            echo "states=$STATE_INPUT" >> $GITHUB_OUTPUT
          fi

      - name: Sync states
        run: |
          DRY_RUN=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN="--dry-run"
          fi
          
          for STATE in ${{ steps.states.outputs.states }}; do
            echo ""
            echo "═══════════════════════════════════════════════"
            echo "  Syncing: $STATE"
            echo "═══════════════════════════════════════════════"
            python supabase_sync.py --state "$STATE" --from-r2 $DRY_RUN
            
            if [ $? -ne 0 ]; then
              echo "❌ Sync failed for $STATE"
              # Continue with other states even if one fails
            fi
          done

      - name: Verify sync results
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          for STATE in ${{ steps.states.outputs.states }}; do
            echo ""
            echo "Verifying: $STATE"
            
            # Get state name from abbreviation
            STATE_NAME=$(python -c "
          STATES = {'de':'delaware','va':'virginia','co':'colorado','md':'maryland','oh':'ohio','tx':'texas','fl':'florida','pa':'pennsylvania','il':'illinois','ny':'new_york','nc':'north_carolina','ga':'georgia','mi':'michigan','nj':'new_jersey','wa':'washington','ma':'massachusetts','az':'arizona','tn':'tennessee','in':'indiana','mo':'missouri','wi':'wisconsin','mn':'minnesota','sc':'south_carolina','al':'alabama','la':'louisiana','ky':'kentucky','or':'oregon','ok':'oklahoma','ct':'connecticut','ia':'iowa','ms':'mississippi','ar':'arkansas','ut':'utah','nv':'nevada','ks':'kansas','ne':'nebraska','nm':'new_mexico','wv':'west_virginia','id':'idaho','hi':'hawaii','me':'maine','nh':'new_hampshire','ri':'rhode_island','mt':'montana','sd':'south_dakota','nd':'north_dakota','ak':'alaska','vt':'vermont','wy':'wyoming','dc':'district_of_columbia'}
          print(STATES.get('$STATE',''))
            ")
            
            PGPASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }} psql \
              -h localhost -p 5432 -U postgres -d postgres \
              -c "SELECT '$STATE' AS state, COUNT(*) AS rows FROM crashes_${STATE_NAME};"
            
            PGPASSWORD=${{ secrets.SUPABASE_DB_PASSWORD }} psql \
              -h localhost -p 5432 -U postgres -d postgres \
              -c "SELECT abbr, pipeline_status, total_crashes, year_range, last_sync_at FROM states WHERE abbr = '$STATE';"
          done

      - name: Cleanup SSH tunnel
        if: always()
        run: |
          # Kill SSH tunnel
          pkill -f "ssh.*supabase_tunnel" || true
