# ==============================================================================
# Supabase: Sync State Data (Batched Matrix Strategy)
# ==============================================================================
# Plan → Matrix batch jobs → Finalize
# Each batch processes 25K rows in its own job (peak ~1.8 GB).
# Same pattern as generate-mapillary-cache.yml.
# ==============================================================================

name: "Supabase: Sync State Data"

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'State abbreviation'
        required: true
        type: choice
        options:
          - de
          - va
          - co
          - md
          - ct
          - pa
          - nj
      batch_size:
        description: 'Rows per batch'
        required: false
        type: choice
        default: '25000'
        options:
          - '10000'
          - '25000'
          - '50000'
      resume:
        description: 'Resume (skip existing objectids)'
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      state:
        required: true
        type: string
      batch_size:
        required: false
        type: string
        default: '25000'
      resume:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
  R2_BUCKET: crash-lens-data

jobs:
  # ════════════════════════════════════════════════════════════
  #  PLAN — Count rows, create batch matrix
  # ════════════════════════════════════════════════════════════
  plan:
    name: "Plan (${{ inputs.state }})"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      batch_matrix: ${{ steps.plan.outputs.batch_matrix }}
      total_rows: ${{ steps.plan.outputs.total_rows }}
      total_batches: ${{ steps.plan.outputs.total_batches }}
      batch_size: ${{ steps.plan.outputs.batch_size }}
      state_name: ${{ steps.plan.outputs.state_name }}
      r2_key: ${{ steps.plan.outputs.r2_key }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install pandas pyarrow boto3

      - name: Plan batches
        id: plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ inputs.state }}"
          BATCH_SIZE="${{ inputs.batch_size || '25000' }}"

          python3 << 'PYEOF'
          import json, os, sys
          import boto3
          import pyarrow.parquet as pq

          state_abbr = os.environ.get("STATE", "${{ inputs.state }}")
          batch_size = int(os.environ.get("BATCH_SIZE", "${{ inputs.batch_size || '25000' }}"))

          # Get state name from registry
          from states_registry import STATES
          if state_abbr not in STATES:
              print(f"Unknown state: {state_abbr}")
              sys.exit(1)
          display, state_name, fips = STATES[state_abbr]

          # Find statewide parquet in R2
          endpoint = "${{ env.R2_ENDPOINT }}"
          s3 = boto3.client("s3",
              endpoint_url=endpoint,
              aws_access_key_id=os.environ["AWS_ACCESS_KEY_ID"],
              aws_secret_access_key=os.environ["AWS_SECRET_ACCESS_KEY"],
              region_name="auto")

          r2_key = f"{state_name}/_statewide/statewide_all_roads.parquet.gz"
          local = "statewide.parquet.gz"

          print(f"Downloading {r2_key}...")
          s3.download_file("crash-lens-data", r2_key, local)

          # Count rows without loading into memory
          pf = pq.ParquetFile(local)
          total_rows = pf.metadata.num_rows
          print(f"Total rows: {total_rows:,}")

          # Calculate batches
          n_batches = (total_rows + batch_size - 1) // batch_size
          # GitHub Actions matrix limit is 256
          if n_batches > 256:
              batch_size = (total_rows + 255) // 256
              n_batches = (total_rows + batch_size - 1) // batch_size
              print(f"Adjusted batch_size to {batch_size:,} (256 job limit)")

          batches = list(range(1, n_batches + 1))
          matrix = json.dumps({"batch": batches})

          print(f"Batches: {n_batches} x {batch_size:,} rows")
          print(f"Matrix: {matrix[:100]}...")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"batch_matrix={matrix}\n")
              f.write(f"total_rows={total_rows}\n")
              f.write(f"total_batches={n_batches}\n")
              f.write(f"batch_size={batch_size}\n")
              f.write(f"state_name={state_name}\n")
              f.write(f"r2_key={r2_key}\n")

          os.remove(local)
          PYEOF

      - name: Prepare partition
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_SSH_KEY: ${{ secrets.SUPABASE_SSH_KEY }}
        run: |
          STATE="${{ inputs.state }}"
          RESUME="${{ inputs.resume || 'false' }}"

          # Get state_name from registry
          STATE_NAME=$(python3 -c "
          from supabase_sync import STATES
          print(STATES['${STATE}'][1])
          ")

          # SSH tunnel with retry
          mkdir -p ~/.ssh
          echo "$SUPABASE_SSH_KEY" > ~/.ssh/supabase_tunnel
          chmod 600 ~/.ssh/supabase_tunnel
          ssh-keyscan -H srv1503081.hstgr.cloud >> ~/.ssh/known_hosts 2>/dev/null || true

          for attempt in 1 2 3 4 5; do
            echo "SSH tunnel attempt $attempt/5..."

            # Kill any stale tunnel from previous attempt
            pkill -f "ssh.*supabase_tunnel" 2>/dev/null || true
            sleep 2

            if ssh -f -N -L 5432:localhost:5433 \
              -i ~/.ssh/supabase_tunnel \
              root@srv1503081.hstgr.cloud \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=5 \
              -o ConnectTimeout=30 \
              -o TCPKeepAlive=yes \
              -o ExitOnForwardFailure=yes; then

              sleep 3

              # Verify tunnel is alive by testing port
              if python3 -c "
          import socket, sys
          s = socket.socket()
          s.settimeout(10)
          try:
              s.connect(('localhost', 5432))
              s.close()
              print('Port 5432 reachable')
          except Exception as e:
              print(f'Port 5432 NOT reachable: {e}')
              sys.exit(1)
          "; then
                echo "✅ SSH tunnel verified on attempt $attempt"
                break
              else
                echo "⚠️ Tunnel process started but port unreachable"
                pkill -f "ssh.*supabase_tunnel" 2>/dev/null || true
              fi
            else
              echo "⚠️ SSH connection failed on attempt $attempt"
            fi

            if [ $attempt -eq 5 ]; then
              echo "❌ SSH tunnel failed after 5 attempts"
              exit 1
            fi

            WAIT=$((attempt * 10))
            echo "Waiting ${WAIT}s before retry..."
            sleep $WAIT
          done

          # Create partition
          pip install psycopg2-binary > /dev/null 2>&1
          python3 << PYEOF
          import psycopg2, os
          conn = psycopg2.connect(
              host="localhost", port=5432,
              dbname="postgres", user="postgres",
              password=os.environ["SUPABASE_DB_PASSWORD"])
          cur = conn.cursor()

          state_name = "$STATE_NAME"
          resume = "$RESUME"

          if resume != "true":
              print(f"DROP TABLE IF EXISTS crashes_{state_name}")
              cur.execute(f"DROP TABLE IF EXISTS crashes_{state_name}")
              conn.commit()
              print(f"CREATE TABLE crashes_{state_name} PARTITION OF crashes FOR VALUES IN ('{state_name}')")
              cur.execute(f"CREATE TABLE crashes_{state_name} PARTITION OF crashes FOR VALUES IN ('{state_name}')")
              conn.commit()
              print(f"Partition crashes_{state_name} created")
          else:
              cur.execute(f"SELECT EXISTS (SELECT 1 FROM pg_tables WHERE tablename = 'crashes_{state_name}')")
              exists = cur.fetchone()[0]
              if exists:
                  print(f"Partition crashes_{state_name} exists (resume mode)")
              else:
                  print(f"Partition missing -- creating for resume")
                  cur.execute(f"CREATE TABLE crashes_{state_name} PARTITION OF crashes FOR VALUES IN ('{state_name}')")
                  conn.commit()

          conn.close()
          PYEOF

          # Cleanup tunnel
          pkill -f "ssh.*supabase_tunnel" || true

  # ════════════════════════════════════════════════════════════
  #  SYNC BATCHES — Each batch = 25K rows, own job, 360 min
  # ════════════════════════════════════════════════════════════
  sync:
    name: "Batch ${{ matrix.batch }}/${{ needs.plan.outputs.total_batches }}"
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.batch_matrix) }}
      max-parallel: 1
      fail-fast: false
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install pandas pyarrow psycopg2-binary boto3

      - name: Download statewide parquet
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          R2_KEY="${{ needs.plan.outputs.r2_key }}"
          aws s3 cp "s3://${{ env.R2_BUCKET }}/$R2_KEY" statewide.parquet.gz \
            --endpoint-url "${{ env.R2_ENDPOINT }}" --only-show-errors
          echo "Downloaded: $(ls -lh statewide.parquet.gz | awk '{print $5}')"

      - name: Setup SSH tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SUPABASE_SSH_KEY }}" > ~/.ssh/supabase_tunnel
          chmod 600 ~/.ssh/supabase_tunnel
          ssh-keyscan -H srv1503081.hstgr.cloud >> ~/.ssh/known_hosts 2>/dev/null || true

          for attempt in 1 2 3 4 5; do
            echo "SSH tunnel attempt $attempt/5..."

            # Kill any stale tunnel from previous attempt
            pkill -f "ssh.*supabase_tunnel" 2>/dev/null || true
            sleep 2

            if ssh -f -N -L 5432:localhost:5433 \
              -i ~/.ssh/supabase_tunnel \
              root@srv1503081.hstgr.cloud \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=5 \
              -o ConnectTimeout=30 \
              -o TCPKeepAlive=yes \
              -o ExitOnForwardFailure=yes; then

              sleep 3

              # Verify tunnel is alive by testing port
              if python3 -c "
          import socket, sys
          s = socket.socket()
          s.settimeout(10)
          try:
              s.connect(('localhost', 5432))
              s.close()
              print('Port 5432 reachable')
          except Exception as e:
              print(f'Port 5432 NOT reachable: {e}')
              sys.exit(1)
          "; then
                echo "✅ SSH tunnel verified on attempt $attempt"
                break
              else
                echo "⚠️ Tunnel process started but port unreachable"
                pkill -f "ssh.*supabase_tunnel" 2>/dev/null || true
              fi
            else
              echo "⚠️ SSH connection failed on attempt $attempt"
            fi

            if [ $attempt -eq 5 ]; then
              echo "❌ SSH tunnel failed after 5 attempts"
              exit 1
            fi

            WAIT=$((attempt * 10))
            echo "Waiting ${WAIT}s before retry..."
            sleep $WAIT
          done

      - name: "Sync batch ${{ matrix.batch }}"
        timeout-minutes: 60
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          STATE="${{ inputs.state }}"
          BATCH="${{ matrix.batch }}"
          BATCH_SIZE="${{ needs.plan.outputs.batch_size || inputs.batch_size || '25000' }}"
          TOTAL="${{ needs.plan.outputs.total_rows }}"
          RESUME="${{ inputs.resume || 'false' }}"

          RESUME_FLAG=""
          if [ "$RESUME" = "true" ]; then
            RESUME_FLAG="--resume"
          fi

          python supabase_sync.py \
            --state "$STATE" \
            --input statewide.parquet.gz \
            --batch "$BATCH" \
            --batch-size "$BATCH_SIZE" \
            --total-rows "$TOTAL" \
            $RESUME_FLAG

      - name: Cleanup SSH tunnel
        if: always()
        run: pkill -f "ssh.*supabase_tunnel" 2>/dev/null || true

  # ════════════════════════════════════════════════════════════
  #  FINALIZE — geom, matviews, states table
  # ════════════════════════════════════════════════════════════
  finalize:
    name: "Finalize (${{ inputs.state }})"
    needs: [plan, sync]
    if: always() && needs.plan.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install pandas psycopg2-binary

      - name: Setup SSH tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SUPABASE_SSH_KEY }}" > ~/.ssh/supabase_tunnel
          chmod 600 ~/.ssh/supabase_tunnel
          ssh-keyscan -H srv1503081.hstgr.cloud >> ~/.ssh/known_hosts 2>/dev/null || true

          for attempt in 1 2 3 4 5; do
            echo "SSH tunnel attempt $attempt/5..."

            # Kill any stale tunnel from previous attempt
            pkill -f "ssh.*supabase_tunnel" 2>/dev/null || true
            sleep 2

            if ssh -f -N -L 5432:localhost:5433 \
              -i ~/.ssh/supabase_tunnel \
              root@srv1503081.hstgr.cloud \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=5 \
              -o ConnectTimeout=30 \
              -o TCPKeepAlive=yes \
              -o ExitOnForwardFailure=yes; then

              sleep 3

              # Verify tunnel is alive by testing port
              if python3 -c "
          import socket, sys
          s = socket.socket()
          s.settimeout(10)
          try:
              s.connect(('localhost', 5432))
              s.close()
              print('Port 5432 reachable')
          except Exception as e:
              print(f'Port 5432 NOT reachable: {e}')
              sys.exit(1)
          "; then
                echo "✅ SSH tunnel verified on attempt $attempt"
                break
              else
                echo "⚠️ Tunnel process started but port unreachable"
                pkill -f "ssh.*supabase_tunnel" 2>/dev/null || true
              fi
            else
              echo "⚠️ SSH connection failed on attempt $attempt"
            fi

            if [ $attempt -eq 5 ]; then
              echo "❌ SSH tunnel failed after 5 attempts"
              exit 1
            fi

            WAIT=$((attempt * 10))
            echo "Waiting ${WAIT}s before retry..."
            sleep $WAIT
          done

      - name: Finalize
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python supabase_sync.py \
            --state "${{ inputs.state }}" \
            --finalize

      - name: Cleanup SSH tunnel
        if: always()
        run: pkill -f "ssh.*supabase_tunnel" 2>/dev/null || true
