name: "Generate HPMS Cache (Nationwide)"

# ═══════════════════════════════════════════════════════════════
#  CrashLens — HPMS Federal Road Data for All 51 States
#  
#  Downloads AADT, Functional Class, Speed Limit, Lanes, etc.
#  from FHWA's Highway Performance Monitoring System.
#
#  SCHEDULE: Annually on Jan 15 (HPMS updates ~annually)
#  MANUAL: Select scope and run from Actions tab
#
#  Primary: ArcGIS REST API at geodata.bts.gov
#  Fallback: FHWA shapefile download (per-state zip)
# ═══════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 10 15 1 *'    # Jan 15 at 5 AM EST (annual HPMS refresh)

  workflow_dispatch:
    inputs:
      scope:
        description: 'What to generate'
        required: true
        type: choice
        default: 'nationwide'
        options:
          - nationwide
          - single-state
          - batch1-small
          - batch2-medium
          - batch3-large
          - batch4-west
          - batch5-remaining
      single_state:
        description: 'State abbreviation (only for single-state)'
        required: false
        default: ''
      force_regenerate:
        description: 'Force regenerate (overwrite existing R2 cache)'
        required: false
        type: boolean
        default: false

env:
  R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
  R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: "crash-lens-data"

jobs:

  batch1-small:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'nationwide' ||
      github.event.inputs.scope == 'batch1-small'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests pandas pyarrow geopandas boto3
      - name: "Batch 1: DE RI CT DC NH VT HI WV ME SD WY"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_hpms_data.py --state de ri ct dc nh vt hi wv me sd wy $FORCE

  batch2-medium:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'nationwide' ||
      github.event.inputs.scope == 'batch2-medium'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests pandas pyarrow geopandas boto3
      - name: "Batch 2: NJ MD MA IN IA KS NE ND SC KY"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_hpms_data.py --state nj md ma in ia ks ne nd sc ky $FORCE

  batch3-large:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'nationwide' ||
      github.event.inputs.scope == 'batch3-large'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests pandas pyarrow geopandas boto3
      - name: "Batch 3: TX CA FL NY PA IL MI AL GA NC"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_hpms_data.py --state tx ca fl ny pa il mi al ga nc $FORCE

  batch4-west:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'nationwide' ||
      github.event.inputs.scope == 'batch4-west'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests pandas pyarrow geopandas boto3
      - name: "Batch 4: AZ NM OR WA MT ID NV UT CO WI"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_hpms_data.py --state az nm or wa mt id nv ut co wi $FORCE

  batch5-remaining:
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'nationwide' ||
      github.event.inputs.scope == 'batch5-remaining'
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests pandas pyarrow geopandas boto3
      - name: "Batch 5: VA OH TN MO MN MS AR LA OK AK"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_hpms_data.py --state va oh tn mo mn ms ar la ok ak $FORCE

  single-state:
    if: github.event.inputs.scope == 'single-state' && github.event.inputs.single_state != ''
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests pandas pyarrow geopandas boto3
      - name: "Generate: ${{ github.event.inputs.single_state }}"
        run: |
          FORCE=""
          [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          python generate_hpms_data.py --state ${{ github.event.inputs.single_state }} $FORCE
