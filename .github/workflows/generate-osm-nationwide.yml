# ==============================================================================
# OSM Road Network — Nationwide County-by-County Download
# ==============================================================================
# Downloads OSM roads, intersections, and POIs for all 50 states + DC
# using county-by-county downloading to avoid OOM and timeout issues.
#
# STRATEGY:
#   - Matrix of states, max-parallel: 3 (3 states downloading at once)
#   - Each state: 2 parallel county workers (--parallel 2)
#   - Total: 6 concurrent Overpass API queries (safe under rate limits)
#   - Each state job: 6h timeout (GitHub max)
#   - Preflight: checks R2, skips states with existing cache
#
# WALL CLOCK:
#   Small states (DE, RI, DC):     ~3 min each
#   Medium states (VA, MD, CO):    ~30-60 min each
#   Large states (TX, CA, OH):     ~2-5 hrs each
#   Total nationwide (3 parallel): ~3-5 days
#
# RE-RUNNABLE: If the workflow fails or times out, re-run it.
#   - Preflight skips states with all 3 cache files in R2
#   - Net effect: picks up exactly where it left off
#
# OUTPUT PER STATE (3 files in R2):
#   {state}/cache/{abbr}_roads.parquet.gz
#   {state}/cache/{abbr}_intersections.parquet.gz
#   {state}/cache/{abbr}_pois.parquet.gz
# ==============================================================================

name: "OSM: Nationwide Download"

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which states to download'
        required: true
        default: 'nationwide'
        type: choice
        options:
          - nationwide
          - small_states
          - medium_states
          - large_states
          - single_state

      state:
        description: 'State abbreviation (only for scope=single_state)'
        required: false
        default: ''
        type: string

      parallel:
        description: 'Parallel county workers per state'
        required: false
        type: choice
        default: '2'
        options:
          - '1'
          - '2'
          - '3'

      max_states:
        description: 'Max parallel state jobs'
        required: false
        type: choice
        default: '3'
        options:
          - '1'
          - '2'
          - '3'
          - '4'

      mode:
        description: 'Download mode'
        required: false
        type: choice
        default: 'roads+pois'
        options:
          - roads+pois
          - roads-only
          - pois-only

      force:
        description: 'Force re-download even if cache exists in R2'
        required: false
        type: boolean
        default: false

  schedule:
    # Monthly: 1st Friday at 2am UTC
    - cron: '0 2 1-7 * 5'

permissions:
  contents: read

env:
  R2_BUCKET: crash-lens-data

jobs:
  # ════════════════════════════════════════════════════════════════
  #  PREFLIGHT: Check R2 for completed states, build matrix
  # ════════════════════════════════════════════════════════════════
  preflight:
    name: "Preflight — Build state matrix"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      total: ${{ steps.matrix.outputs.total }}

    steps:
      - uses: actions/checkout@v5

      - name: Build state matrix
        id: matrix
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          R2="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          SCOPE="${{ github.event.inputs.scope || 'nationwide' }}"
          FORCE="${{ github.event.inputs.force || 'false' }}"
          SINGLE="${{ github.event.inputs.state || '' }}"
          MODE="${{ github.event.inputs.mode || 'roads+pois' }}"

          # ── Define state groups (ordered small → large) ──
          SMALL="dc ri de ct nj nh vt ma md hi me wv"
          MEDIUM="sc nc ky ar ms al la ia ok ks ne nd sd wy nm id nv ut az co va ga wi mn mo in mt"
          LARGE="oh pa il mi fl ny wa or tn tx ca ak"

          if [ "$SCOPE" = "single_state" ] && [ -n "$SINGLE" ]; then
            ALL_STATES="$SINGLE"
          elif [ "$SCOPE" = "small_states" ]; then
            ALL_STATES="$SMALL"
          elif [ "$SCOPE" = "medium_states" ]; then
            ALL_STATES="$MEDIUM"
          elif [ "$SCOPE" = "large_states" ]; then
            ALL_STATES="$LARGE"
          else
            ALL_STATES="$SMALL $MEDIUM $LARGE"
          fi

          # ── State → R2 prefix mapping ──
          declare -A PREFIXES=(
            [al]=alabama [ak]=alaska [az]=arizona [ar]=arkansas [ca]=california
            [co]=colorado [ct]=connecticut [de]=delaware [dc]=district_of_columbia
            [fl]=florida [ga]=georgia [hi]=hawaii [id]=idaho [il]=illinois
            [in]=indiana [ia]=iowa [ks]=kansas [ky]=kentucky [la]=louisiana
            [me]=maine [md]=maryland [ma]=massachusetts [mi]=michigan [mn]=minnesota
            [ms]=mississippi [mo]=missouri [mt]=montana [ne]=nebraska [nv]=nevada
            [nh]=new_hampshire [nj]=new_jersey [nm]=new_mexico [ny]=new_york
            [nc]=north_carolina [nd]=north_dakota [oh]=ohio [ok]=oklahoma [or]=oregon
            [pa]=pennsylvania [ri]=rhode_island [sc]=south_carolina [sd]=south_dakota
            [tn]=tennessee [tx]=texas [ut]=utah [vt]=vermont [va]=virginia
            [wa]=washington [wv]=west_virginia [wi]=wisconsin [wy]=wyoming
          )

          # ── Check R2 for completed states ──
          # A state is "done" if roads cache exists (primary output)
          NEEDED=""
          SKIPPED=""
          for STATE in $ALL_STATES; do
            PREFIX="${PREFIXES[$STATE]:-$STATE}"

            if [ "$FORCE" = "true" ]; then
              NEEDED="$NEEDED $STATE"
              continue
            fi

            # Check based on mode
            if [ "$MODE" = "pois-only" ]; then
              CHECK_FILE="${STATE}_pois.parquet.gz"
            else
              CHECK_FILE="${STATE}_roads.parquet.gz"
            fi

            if aws s3 ls "s3://${R2_BUCKET}/${PREFIX}/cache/${CHECK_FILE}" \
                --endpoint-url "$R2" 2>/dev/null | grep -q parquet; then
              SKIPPED="$SKIPPED $STATE"
            else
              NEEDED="$NEEDED $STATE"
            fi
          done

          NEEDED=$(echo $NEEDED | xargs)
          SKIPPED=$(echo $SKIPPED | xargs)
          TOTAL=$(echo $NEEDED | wc -w)

          echo "Scope: $SCOPE | Mode: $MODE"
          echo "States needed: $NEEDED"
          echo "States skipped: $SKIPPED"
          echo "Total: $TOTAL"

          if [ -z "$NEEDED" ]; then
            echo "All states already cached in R2!"
            echo 'matrix={"state":[]}' >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
          else
            JSON="["
            FIRST=true
            for STATE in $NEEDED; do
              if [ "$FIRST" = true ]; then FIRST=false; else JSON="$JSON,"; fi
              JSON="$JSON\"$STATE\""
            done
            JSON="$JSON]"
            echo "matrix={\"state\":$JSON}" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
          fi

      - name: Preflight summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## OSM Nationwide — Preflight

          | Detail | Value |
          |--------|-------|
          | Scope | ${{ github.event.inputs.scope || 'nationwide' }} |
          | Mode | ${{ github.event.inputs.mode || 'roads+pois' }} |
          | States to process | ${{ steps.matrix.outputs.total }} |
          | Parallel states | ${{ github.event.inputs.max_states || '3' }} |
          | Workers per state | ${{ github.event.inputs.parallel || '2' }} |
          | Force | ${{ github.event.inputs.force || 'false' }} |
          EOF

  # ════════════════════════════════════════════════════════════════
  #  DOWNLOAD: One job per state
  # ════════════════════════════════════════════════════════════════
  download:
    name: "${{ matrix.state }}"
    needs: preflight
    if: needs.preflight.outputs.total != '0'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      matrix: ${{ fromJson(needs.preflight.outputs.matrix) }}
      max-parallel: ${{ fromJson(github.event.inputs.max_states || '3') }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install osmnx scipy geopandas pandas pyarrow boto3

      - name: Download us_counties.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          aws s3 cp "s3://${R2_BUCKET}/_national/us_counties.json" us_counties.json \
            --endpoint-url "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com" --only-show-errors

      - name: Download OSM (${{ matrix.state }})
        id: download
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET: crash-lens-data
        run: |
          STATE="${{ matrix.state }}"
          PARALLEL="${{ github.event.inputs.parallel || '2' }}"
          MODE="${{ github.event.inputs.mode || 'roads+pois' }}"

          mkdir -p cache

          ARGS="--state $STATE --parallel $PARALLEL --cache-dir cache --resume"

          if [ "$MODE" = "roads-only" ]; then
            ARGS="$ARGS --roads-only"
          elif [ "$MODE" = "pois-only" ]; then
            ARGS="$ARGS --pois-only"
          fi

          echo "start_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "Running: python osm_county_download.py $ARGS"

          python osm_county_download.py $ARGS

          # Check outputs
          STATUS="completed"
          ROADS_SIZE=0
          POIS_SIZE=0

          if [ -f "cache/${STATE}_roads.parquet.gz" ]; then
            ROADS_SIZE=$(stat -c%s "cache/${STATE}_roads.parquet.gz" 2>/dev/null || echo "0")
          fi
          if [ -f "cache/${STATE}_pois.parquet.gz" ]; then
            POIS_SIZE=$(stat -c%s "cache/${STATE}_pois.parquet.gz" 2>/dev/null || echo "0")
          fi

          if [ "$MODE" != "pois-only" ] && [ "$ROADS_SIZE" = "0" ]; then
            STATUS="failed"
          fi

          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "roads_mb=$((ROADS_SIZE / 1048576))" >> $GITHUB_OUTPUT
          echo "pois_mb=$((POIS_SIZE / 1048576))" >> $GITHUB_OUTPUT

      - name: Job summary
        if: always()
        run: |
          STATE="${{ matrix.state }}"
          STATUS="${{ steps.download.outputs.status || 'unknown' }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## OSM Cache: ${STATE}

          | Detail | Value |
          |--------|-------|
          | State | ${STATE} |
          | Status | ${STATUS} |
          | Roads | ${{ steps.download.outputs.roads_mb || '0' }} MB |
          | POIs | ${{ steps.download.outputs.pois_mb || '0' }} MB |
          | Workers | ${{ github.event.inputs.parallel || '2' }} |
          | Started | ${{ steps.download.outputs.start_time || 'N/A' }} |
          EOF

  # ════════════════════════════════════════════════════════════════
  #  RETRY: After all matrix jobs, retry failed states one-at-a-time
  # ════════════════════════════════════════════════════════════════
  retry:
    name: "Retry failed states"
    needs: [preflight, download]
    if: always() && needs.preflight.outputs.total != '0'
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install osmnx scipy geopandas pandas pyarrow boto3

      - name: Download us_counties.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          aws s3 cp "s3://${R2_BUCKET}/_national/us_counties.json" us_counties.json \
            --endpoint-url "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com" --only-show-errors

      - name: Find and retry failed states
        id: retry
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET: crash-lens-data
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          R2="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          MODE="${{ github.event.inputs.mode || 'roads+pois' }}"

          declare -A PREFIXES=(
            [al]=alabama [ak]=alaska [az]=arizona [ar]=arkansas [ca]=california
            [co]=colorado [ct]=connecticut [de]=delaware [dc]=district_of_columbia
            [fl]=florida [ga]=georgia [hi]=hawaii [id]=idaho [il]=illinois
            [in]=indiana [ia]=iowa [ks]=kansas [ky]=kentucky [la]=louisiana
            [me]=maine [md]=maryland [ma]=massachusetts [mi]=michigan [mn]=minnesota
            [ms]=mississippi [mo]=missouri [mt]=montana [ne]=nebraska [nv]=nevada
            [nh]=new_hampshire [nj]=new_jersey [nm]=new_mexico [ny]=new_york
            [nc]=north_carolina [nd]=north_dakota [oh]=ohio [ok]=oklahoma [or]=oregon
            [pa]=pennsylvania [ri]=rhode_island [sc]=south_carolina [sd]=south_dakota
            [tn]=tennessee [tx]=texas [ut]=utah [vt]=vermont [va]=virginia
            [wa]=washington [wv]=west_virginia [wi]=wisconsin [wy]=wyoming
          )

          # Check which states from the original matrix are still missing
          ALL="dc ri de ct nj nh vt ma md hi me wv sc nc ky ar ms al la ia ok ks ne nd sd wy nm id nv ut az co va oh pa il mi ga wi mn mo fl ny wa or tn tx ca ak in mt"
          FAILED=""
          for STATE in $ALL; do
            PREFIX="${PREFIXES[$STATE]:-$STATE}"
            if [ "$MODE" = "pois-only" ]; then
              CHECK="${STATE}_pois.parquet.gz"
            else
              CHECK="${STATE}_roads.parquet.gz"
            fi
            if ! aws s3 ls "s3://${R2_BUCKET}/${PREFIX}/cache/${CHECK}" \
                --endpoint-url "$R2" 2>/dev/null | grep -q parquet; then
              FAILED="$FAILED $STATE"
            fi
          done

          FAILED=$(echo $FAILED | xargs)
          FAIL_COUNT=$(echo $FAILED | wc -w)

          if [ -z "$FAILED" ]; then
            echo "✅ All states completed — no retries needed"
            echo "retried=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "🔄 Retrying $FAIL_COUNT failed states one-at-a-time: $FAILED"
          echo "retried=$FAIL_COUNT" >> $GITHUB_OUTPUT

          mkdir -p cache

          for STATE in $FAILED; do
            echo ""
            echo "════════════════════════════════════════"
            echo "  RETRY: $STATE (1 worker, no parallel)"
            echo "════════════════════════════════════════"

            ARGS="--state $STATE --parallel 1 --cache-dir cache --resume"
            if [ "$MODE" = "roads-only" ]; then
              ARGS="$ARGS --roads-only"
            elif [ "$MODE" = "pois-only" ]; then
              ARGS="$ARGS --pois-only"
            fi

            python osm_county_download.py $ARGS || {
              echo "::warning::Retry failed for $STATE"
            }

            # Clean up disk between states
            rm -f cache/*.parquet cache/*.parquet.gz
          done

      - name: Retry summary
        if: always()
        run: |
          RETRIED="${{ steps.retry.outputs.retried || '0' }}"
          echo "## OSM Retry Results" >> $GITHUB_STEP_SUMMARY
          echo "States retried: ${RETRIED}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  #  SUMMARY: Final coverage report
  # ════════════════════════════════════════════════════════════════
  summary:
    name: "Nationwide Summary"
    needs: [preflight, download, retry]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check R2 coverage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          R2="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"

          declare -A PREFIXES=(
            [al]=alabama [ak]=alaska [az]=arizona [ar]=arkansas [ca]=california
            [co]=colorado [ct]=connecticut [de]=delaware [dc]=district_of_columbia
            [fl]=florida [ga]=georgia [hi]=hawaii [id]=idaho [il]=illinois
            [in]=indiana [ia]=iowa [ks]=kansas [ky]=kentucky [la]=louisiana
            [me]=maine [md]=maryland [ma]=massachusetts [mi]=michigan [mn]=minnesota
            [ms]=mississippi [mo]=missouri [mt]=montana [ne]=nebraska [nv]=nevada
            [nh]=new_hampshire [nj]=new_jersey [nm]=new_mexico [ny]=new_york
            [nc]=north_carolina [nd]=north_dakota [oh]=ohio [ok]=oklahoma [or]=oregon
            [pa]=pennsylvania [ri]=rhode_island [sc]=south_carolina [sd]=south_dakota
            [tn]=tennessee [tx]=texas [ut]=utah [vt]=vermont [va]=virginia
            [wa]=washington [wv]=west_virginia [wi]=wisconsin [wy]=wyoming
          )

          ALL="dc ri de ct nj nh vt ma md hi me wv sc nc ky ar ms al la ia ok ks ne nd sd wy nm id nv ut az co va oh pa il mi ga wi mn mo fl ny wa or tn tx ca ak in mt"

          DONE_R=0; DONE_P=0; DONE_I=0
          MISSING_R=""
          for STATE in $ALL; do
            PREFIX="${PREFIXES[$STATE]:-$STATE}"
            if aws s3 ls "s3://${R2_BUCKET}/${PREFIX}/cache/${STATE}_roads.parquet.gz" \
                --endpoint-url "$R2" 2>/dev/null | grep -q parquet; then
              DONE_R=$((DONE_R + 1))
            else
              MISSING_R="$MISSING_R $STATE"
            fi
            aws s3 ls "s3://${R2_BUCKET}/${PREFIX}/cache/${STATE}_pois.parquet.gz" \
              --endpoint-url "$R2" 2>/dev/null | grep -q parquet && DONE_P=$((DONE_P + 1))
            aws s3 ls "s3://${R2_BUCKET}/${PREFIX}/cache/${STATE}_intersections.parquet.gz" \
              --endpoint-url "$R2" 2>/dev/null | grep -q parquet && DONE_I=$((DONE_I + 1))
          done

          TOTAL=$(echo $ALL | wc -w)
          MISSING_R=$(echo $MISSING_R | xargs)

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## OSM Nationwide — Final Summary

          | Cache Type | Coverage |
          |------------|----------|
          | Roads | ${DONE_R} / ${TOTAL} |
          | Intersections | ${DONE_I} / ${TOTAL} |
          | POIs | ${DONE_P} / ${TOTAL} |

          **Missing roads:** ${MISSING_R:-none}

          Re-run this workflow to pick up any remaining states.
          EOF
