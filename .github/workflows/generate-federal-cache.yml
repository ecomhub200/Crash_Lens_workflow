name: "Generate Federal Cache (Nationwide)"

# ═══════════════════════════════════════════════════════════════
#  CrashLens — Federal Safety Data for All 51 States
#  Schools (Urban Institute) + Bridges (NBI) + Rail Crossings (FRA)
#  + Transit Stops (NTM). Each state = own job.
#  Fast APIs — each state ~2-5 min for all 4 sources.
# ═══════════════════════════════════════════════════════════════

on:
  schedule:
    - cron: '0 6 15 1 *'     # Jan 15 annually (same as HPMS)

  workflow_dispatch:
    inputs:
      scope:
        description: 'What to generate'
        required: true
        type: choice
        default: 'nationwide'
        options:
          - nationwide
          - single-state
          - al
          - ak
          - az
          - ar
          - ca
          - co
          - ct
          - de
          - dc
          - fl
          - ga
          - hi
          - id
          - il
          - in
          - ia
          - ks
          - ky
          - la
          - me
          - md
          - ma
          - mi
          - mn
          - ms
          - mo
          - mt
          - ne
          - nv
          - nh
          - nj
          - nm
          - ny
          - nc
          - nd
          - oh
          - ok
          - or
          - pa
          - ri
          - sc
          - sd
          - tn
          - tx
          - ut
          - vt
          - va
          - wa
          - wv
          - wi
          - wy
      single_state:
        description: 'State abbreviation (only for single-state scope)'
        required: false
        default: ''
      source:
        description: 'Which source(s) to download'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - schools
          - bridges
          - rail_crossings
          - transit
      force_regenerate:
        description: '⚠️  Force regenerate (re-downloads ALL)'
        required: false
        type: boolean
        default: false

env:
  R2_ENDPOINT: "https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
  R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: "crash-lens-data"

jobs:

  alabama:
    if: github.event_name == 'schedule' || github.event.inputs.scope == 'nationwide' || github.event.inputs.scope == 'al'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests pandas pyarrow boto3
      - name: "Alabama (AL)"
        run: |
          FORCE=""; [ "${{ github.event.inputs.force_regenerate }}" = "true" ] && FORCE="--force"
          SOURCE="${{ github.event.inputs.source }}"
          [ -z "$SOURCE" ] && SOURCE="all"
          python generate_federal_data.py --state al --source $SOURCE $FORCE
      - if: always()
        run: echo "### Alabama (AL)" >> $GITHUB_STEP_SUMMARY && ls -lh cache/*.gz 2>/dev/null >> $GITHUB_STEP_SUMMARY || true

