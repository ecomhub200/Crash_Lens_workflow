# ==============================================================================
# Delaware — Batch Pipeline (Statewide Processing)  v2.9
# ==============================================================================
# v2.9: Stage 4.5 moved to batched workflow_call (supabase-sync.yml matrix strategy)
# v2.8: Added Stage 4.5 — Supabase Sync (R2 parquet → PostgreSQL)
# v2.7: _statewide/ path (not statewide/), parquet.gz format, road inventory join
#
# Processes Delaware statewide crash data through the pipeline.
# Triggered by delaware-batch-all-jurisdictions.yml after it normalizes,
# joins to road inventory, and uploads the statewide parquet to R2.
#
# Stage order: Download from R2 (_statewide/) → Init Cache →
#              Split (jurisdiction + road type + aggregate in one pass) →
#              Upload → Supabase Sync → Predict → Aggregate Forecasts → Manifest
# ==============================================================================

name: "Delaware: Batch Pipeline"

on:
  workflow_dispatch:
    inputs:
      state:
        description: 'State to process (always delaware)'
        required: false
        default: 'delaware'
        type: string

      scope:
        description: 'Processing scope'
        required: false
        default: 'statewide'
        type: string

      selection:
        description: 'Selection (blank for statewide)'
        required: false
        default: ''
        type: string

      r2_data_key:
        description: 'R2 key for normalized statewide CSV (leave blank to use default statewide/ path)'
        required: false
        default: ''
        type: string

      skip_forecasts:
        description: 'Skip forecast generation'
        required: false
        default: 'false'
        type: string

      skip_supabase:
        description: 'Skip Supabase sync'
        required: false
        default: 'false'
        type: string

      smart_fill:
        description: 'Smart-fill: enrich crashes from road inventory (FC, Ownership, Speed, Lanes, AADT, etc.)'
        required: false
        default: 'true'
        type: string

      dry_run:
        description: 'Dry run (no uploads, no commits)'
        required: false
        default: 'false'
        type: string

      resume_supabase:
        description: '[DEPRECATED] Resume Supabase sync — webhook path runs full sync; only used by manual supabase-sync.yml fallback'
        required: false
        default: 'false'
        type: string

permissions:
  contents: write

env:
  NOTIFICATION_EMAIL: ecomhub200@gmail.com

jobs:
  # ============================================================
  # JOB 1: Resolve scope + Download from R2
  # ============================================================
  prepare:
    name: "Prepare (Delaware)"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      state: ${{ steps.resolve.outputs.state }}
      scope: ${{ steps.resolve.outputs.scope }}
      selection: ${{ steps.resolve.outputs.selection }}
      dot_name: ${{ steps.resolve.outputs.dot_name }}
      data_dir: ${{ steps.resolve.outputs.data_dir }}
      r2_prefix: ${{ steps.resolve.outputs.r2_prefix }}
      download_mode: ${{ steps.resolve.outputs.download_mode }}
      jurisdiction_count: ${{ steps.resolve.outputs.jurisdiction_count }}
      jurisdictions_json: ${{ steps.resolve.outputs.jurisdictions_json }}
      input_csv: ${{ steps.download_r2.outputs.input_csv }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests openpyxl awscli pyarrow

      - name: Resolve scope
        id: resolve
        run: |
          STATE="${{ github.event.inputs.state || 'delaware' }}"
          SCOPE="${{ github.event.inputs.scope || 'statewide' }}"
          SELECTION="${{ github.event.inputs.selection }}"

          RESOLVED=$(python scripts/resolve_scope.py \
            --state "$STATE" --scope "$SCOPE" --selection "$SELECTION" --json)

          DOT_NAME=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['dot_name'])")
          DATA_DIR=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['data_dir'])")
          R2_PREFIX=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['r2_prefix'])")
          DOWNLOAD_MODE=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['download_mode'])")
          JCOUNT=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.load(sys.stdin)['jurisdiction_count'])")
          JURISDICTIONS=$(echo "$RESOLVED" | python3 -c "import json,sys; print(json.dumps(json.load(sys.stdin)['jurisdictions']))")

          echo "state=$STATE" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "selection=$SELECTION" >> $GITHUB_OUTPUT
          echo "dot_name=$DOT_NAME" >> $GITHUB_OUTPUT
          echo "data_dir=$DATA_DIR" >> $GITHUB_OUTPUT
          echo "r2_prefix=$R2_PREFIX" >> $GITHUB_OUTPUT
          echo "download_mode=$DOWNLOAD_MODE" >> $GITHUB_OUTPUT
          echo "jurisdiction_count=$JCOUNT" >> $GITHUB_OUTPUT
          echo "jurisdictions_json=$JURISDICTIONS" >> $GITHUB_OUTPUT

      - name: "Download normalized statewide data from R2"
        id: download_r2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ steps.resolve.outputs.state }}"
          DATA_DIR="${{ steps.resolve.outputs.data_dir }}"
          R2_KEY="${{ github.event.inputs.r2_data_key }}"
          R2_PREFIX="${{ steps.resolve.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"

          PRIMARY_KEY="${R2_PREFIX}/_statewide/statewide_all_roads.parquet.gz"
          LEGACY_KEY="${R2_PREFIX}/statewide/${STATE}_statewide_all_roads.csv"

          echo "=========================================="
          echo "Downloading normalized Delaware data from R2"
          echo "  Primary:  $PRIMARY_KEY"
          echo "  Fallback: $R2_KEY"
          echo "  Legacy:   $LEGACY_KEY"
          echo "=========================================="

          mkdir -p "$DATA_DIR"
          LOCAL_CSV="$DATA_DIR/${STATE}_statewide_all_roads.csv"
          LOCAL_PQ="$DATA_DIR/${STATE}_statewide_all_roads.parquet.gz"
          DOWNLOADED=false

          for i in 1 2 3 4; do
            if aws s3 cp "s3://$R2_BUCKET/$PRIMARY_KEY" "$LOCAL_PQ" \
              --endpoint-url "$R2_ENDPOINT" --only-show-errors; then
              echo "Download succeeded from _statewide/ (parquet.gz)"
              python3 -c "
          import pandas as pd
          df = pd.read_parquet('$LOCAL_PQ')
          df.to_csv('$LOCAL_CSV', index=False)
          print(f'  Converted: {len(df)} rows, {df.shape[1]} cols → CSV')
          "
              DOWNLOADED=true
              break
            fi
            sleep $((2 ** i))
          done

          if [ "$DOWNLOADED" = "false" ] && [ -n "$R2_KEY" ]; then
            echo "Primary key failed — trying r2_data_key: $R2_KEY"
            if echo "$R2_KEY" | grep -q '\.parquet'; then
              FALLBACK_LOCAL="$LOCAL_PQ"
            elif echo "$R2_KEY" | grep -q '\.gz$'; then
              FALLBACK_LOCAL="${LOCAL_CSV}.gz"
            else
              FALLBACK_LOCAL="$LOCAL_CSV"
            fi
            for i in 1 2 3; do
              if aws s3 cp "s3://$R2_BUCKET/$R2_KEY" "$FALLBACK_LOCAL" \
                --endpoint-url "$R2_ENDPOINT" --only-show-errors; then
                echo "Fallback download succeeded"
                if echo "$FALLBACK_LOCAL" | grep -q '\.parquet'; then
                  python3 -c "
          import pandas as pd
          df = pd.read_parquet('$FALLBACK_LOCAL')
          df.to_csv('$LOCAL_CSV', index=False)
          print(f'  Converted parquet: {len(df)} rows → CSV')
          "
                elif [ "$FALLBACK_LOCAL" = "${LOCAL_CSV}.gz" ]; then
                  gunzip -f "$FALLBACK_LOCAL"
                fi
                DOWNLOADED=true
                break
              fi
              sleep $((2 ** i))
            done
          fi

          if [ "$DOWNLOADED" = "false" ]; then
            echo "Trying legacy path: $LEGACY_KEY"
            for i in 1 2 3; do
              if aws s3 cp "s3://$R2_BUCKET/$LEGACY_KEY" "$LOCAL_CSV" \
                --endpoint-url "$R2_ENDPOINT" --only-show-errors; then
                echo "Download succeeded from legacy statewide/"
                DOWNLOADED=true
                break
              fi
              sleep $((2 ** i))
            done
          fi

          if [ "$DOWNLOADED" = "false" ]; then
            echo "::error::Failed to download statewide data from R2"
            exit 1
          fi

          if [ -f "$LOCAL_CSV" ] && file "$LOCAL_CSV" | grep -q gzip; then
            mv "$LOCAL_CSV" "${LOCAL_CSV}.gz"
            gunzip -f "${LOCAL_CSV}.gz"
          fi

          if [ ! -f "$LOCAL_CSV" ]; then
            echo "::error::No CSV file after download/conversion"
            exit 1
          fi

          TOTAL=$(wc -l < "$LOCAL_CSV" | tr -d ' ')
          SIZE=$(ls -lh "$LOCAL_CSV" | awk '{print $5}')
          echo "Downloaded: $LOCAL_CSV ($((TOTAL - 1)) records, $SIZE)"
          echo "input_csv=$LOCAL_CSV" >> $GITHUB_OUTPUT

  # ============================================================
  # JOB 2: Process (Stages 0-6 — unified split.py)
  # ============================================================
  process:
    name: "Process (Delaware)"
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests openpyxl awscli pyarrow scipy shapely duckdb psycopg2-binary

      - name: "Download statewide data from R2 (parquet.gz)"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          R2_KEY="${{ github.event.inputs.r2_data_key }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"

          PRIMARY_KEY="${R2_PREFIX}/_statewide/statewide_all_roads.parquet.gz"

          mkdir -p "$DATA_DIR"
          LOCAL_PQ="$DATA_DIR/${STATE}_statewide_all_roads.parquet.gz"
          DOWNLOADED=false

          echo "Downloading statewide data from R2 (parquet.gz)..."

          if [ -n "$R2_KEY" ]; then
            echo "Trying r2_data_key: $R2_KEY"
            for i in 1 2 3; do
              if aws s3 cp "s3://$R2_BUCKET/$R2_KEY" "$LOCAL_PQ" \
                --endpoint-url "$R2_ENDPOINT" --only-show-errors; then
                echo "Download succeeded from r2_data_key"
                DOWNLOADED=true
                break
              fi
              sleep $((2 ** i))
            done
          fi

          if [ "$DOWNLOADED" = "false" ]; then
            for i in 1 2 3; do
              if aws s3 cp "s3://$R2_BUCKET/$PRIMARY_KEY" "$LOCAL_PQ" \
                --endpoint-url "$R2_ENDPOINT" --only-show-errors; then
                DOWNLOADED=true
                break
              fi
              sleep $((2 ** i))
            done
          fi

          if [ "$DOWNLOADED" = "false" ]; then
            echo "::error::Could not download statewide data from R2"
            exit 1
          fi

          TOTAL=$(python3 -c "import pandas as pd; print(len(pd.read_parquet('$LOCAL_PQ')))")
          SIZE=$(ls -lh "$LOCAL_PQ" | awk '{print $5}')
          echo "Ready: $LOCAL_PQ ($TOTAL records, $SIZE)"

      # ── Stage 0: Initialize Cache ──
      - name: "Stage 0: Initialize cache"
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          echo "=========================================="
          echo "Stage 0: Initialize state-isolated cache"
          echo "=========================================="
          python scripts/init_cache.py --state "$STATE"

      # ── Stage 0.5: Download road inventory + enrich crashes ──
      - name: "Stage 0.5: Download road inventory from R2"
        if: github.event.inputs.smart_fill != 'false'
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"
          STATE_ABBR=$(python3 -c "from states_registry import STATES; print([k for k,v in STATES.items() if v[1]=='$STATE'][0])")

          mkdir -p cache
          RI_FILE="${STATE_ABBR}_road_inventory.parquet.gz"

          if aws s3 cp "s3://$R2_BUCKET/$R2_PREFIX/cache/$RI_FILE" "cache/$RI_FILE" \
              --endpoint-url "$R2_ENDPOINT" --only-show-errors 2>/dev/null; then
            SIZE=$(stat -c%s "cache/$RI_FILE" 2>/dev/null || echo "0")
            echo "✅ Road inventory: cache/$RI_FILE ($((SIZE / 1048576)) MB)"
          else
            echo "⚠️ Road inventory not found — enrichment will run Tier 1 only"
          fi

      - name: "Stage 0.5: Enrich crashes (crash_enricher + road inventory)"
        if: github.event.inputs.smart_fill != 'false'
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          INPUT_PQ="$DATA_DIR/${STATE}_statewide_all_roads.parquet.gz"
          ENRICHED_PQ="$DATA_DIR/${STATE}_statewide_enriched.parquet.gz"

          ABBR=$(python3 -c "from states_registry import STATES; print([k for k,v in STATES.items() if v[1]=='$STATE'][0])")
          FIPS=$(python3 -c "from states_registry import STATES; print([v[2] for k,v in STATES.items() if v[1]=='$STATE'][0])")

          echo "=========================================="
          echo "  ENRICHMENT: Tier 1 + Road Inventory"
          echo "  Input:  $INPUT_PQ"
          echo "  State:  $STATE ($ABBR / FIPS $FIPS)"
          echo "=========================================="

          if [ -f "$INPUT_PQ" ]; then
            INPUT_FILE="$INPUT_PQ"
          elif [ -f "${INPUT_PQ%.parquet.gz}.csv" ]; then
            INPUT_FILE="${INPUT_PQ%.parquet.gz}.csv"
          else
            echo "::error::No normalized data found"
            exit 1
          fi

          python crash_enricher.py \
            --input "$INPUT_FILE" \
            --output "$ENRICHED_PQ" \
            --state-fips "$FIPS" \
            --state-abbr "$ABBR" \
            --state-name "$STATE" \
            --cache-dir cache

          if [ -f "$ENRICHED_PQ" ]; then
            python3 -c "
          import pandas as pd
          df = pd.read_parquet('$ENRICHED_PQ')
          print(f'Enriched: {len(df):,} rows x {len(df.columns)} columns')
          "
            cp "$ENRICHED_PQ" "$INPUT_PQ"
          else
            echo "Enrichment failed — split will use normalized data"
          fi

      - name: "Stage 0.5b: Upload enriched statewide to R2"
        if: github.event.inputs.smart_fill != 'false' && github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"

          INPUT_PQ="$DATA_DIR/${STATE}_statewide_all_roads.parquet.gz"
          R2_KEY="${R2_PREFIX}/_statewide/statewide_all_roads.parquet.gz"

          if [ -f "$INPUT_PQ" ]; then
            COLS=$(python3 -c "import pyarrow.parquet as pq; print(pq.ParquetFile('$INPUT_PQ').metadata.num_columns)")
            echo "Uploading enriched statewide ($COLS columns) to R2..."
            aws s3 cp "$INPUT_PQ" "s3://$R2_BUCKET/$R2_KEY" \
              --endpoint-url "$R2_ENDPOINT" --only-show-errors
            echo "✅ Enriched statewide uploaded: $R2_KEY ($COLS columns)"
          else
            echo "⚠️ No enriched statewide file found — skipping upload"
          fi

      # ── Stages 1-3: Split ──
      - name: "Stages 1-3: Split by jurisdiction, road type & aggregate"
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          INPUT_PQ="$DATA_DIR/${STATE}_statewide_all_roads.parquet.gz"
          INPUT_CSV="$DATA_DIR/${STATE}_statewide_all_roads.csv"

          echo "=========================================="
          echo "Stages 1-3: Universal split"
          echo "=========================================="

          if [ -f "$INPUT_PQ" ]; then
            INPUT_FILE="$INPUT_PQ"
          elif [ -f "$INPUT_CSV" ]; then
            INPUT_FILE="$INPUT_CSV"
          else
            echo "WARNING: No statewide data found"
            exit 0
          fi

          SPLIT_OUTPUT="data/$STATE"

          python scripts/split.py \
            --input "$INPUT_FILE" \
            --state "$STATE" \
            --hierarchy "states/$STATE/hierarchy.json" \
            --output-dir "$SPLIT_OUTPUT" || {
            echo "::error::split.py failed"
            exit 1
          }

          if [ -f "$SPLIT_OUTPUT/split_manifest.json" ]; then
            python3 -c "
          import json
          with open('$SPLIT_OUTPUT/split_manifest.json') as f:
              m = json.load(f)
          print(f'  Input rows:  {m[\"total_input_rows\"]:,}')
          print(f'  Elapsed:     {m[\"elapsed_s\"]}s')
          print(f'  Counties:    {len(m[\"splits\"].get(\"counties\", {}))}')
          print(f'  Regions:     {len(m[\"splits\"].get(\"regions\", {}))}')
          print(f'  MPOs:        {len(m[\"splits\"].get(\"mpos\", {}))}')
          print(f'  PDs:         {len(m[\"splits\"].get(\"planning_districts\", {}))}')
          print(f'  Cities:      {len(m[\"splits\"].get(\"cities\", {}))}')
          "
          fi

      # ── Pre-upload: Clean stale R2 split data ──
      - name: "Pre-upload: Clean stale R2 split data"
        if: github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"
          for PREFIX in _region _mpo _planning_district _city; do
            echo "Cleaning $R2_PREFIX/$PREFIX/..."
            aws s3 rm "s3://$R2_BUCKET/$R2_PREFIX/$PREFIX/" --recursive \
              --endpoint-url "$R2_ENDPOINT" --only-show-errors 2>/dev/null || true
          done
          # Clean current .parquet files (will be re-uploaded)
          for FILE in all_roads.parquet dot_roads.parquet non_dot_roads.parquet primary_roads.parquet; do
            aws s3 rm "s3://$R2_BUCKET/$R2_PREFIX/_state/$FILE" \
              --endpoint-url "$R2_ENDPOINT" --only-show-errors 2>/dev/null || true
          done
          # Clean legacy .parquet.gz files (superseded by .parquet format)
          for FILE in all_roads.parquet.gz dot_roads.parquet.gz non_dot_roads.parquet.gz primary_roads.parquet.gz; do
            aws s3 rm "s3://$R2_BUCKET/$R2_PREFIX/_state/$FILE" \
              --endpoint-url "$R2_ENDPOINT" --only-show-errors 2>/dev/null || true
          done
          aws s3 rm "s3://$R2_BUCKET/$R2_PREFIX/statewide/" --recursive \
            --endpoint-url "$R2_ENDPOINT" --only-show-errors 2>/dev/null || true
          echo "R2 clean — ready for fresh upload"

      # ── Stage 4: Upload to R2 ──
      - name: "Stage 4: Upload to R2"
        if: github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"
          SPLIT_DIR="data/$STATE"

          echo "=========================================="
          echo "Stage 4: Upload all split files to R2"
          echo "=========================================="

          if [ ! -d "$SPLIT_DIR" ]; then
            echo "::error::Split output directory not found: $SPLIT_DIR"
            exit 1
          fi

          python3 -c "
          import os, sys, subprocess, gzip as gz, shutil

          split_dir = '$SPLIT_DIR'
          r2_prefix = '$R2_PREFIX'
          endpoint  = '$R2_ENDPOINT'
          bucket    = '$R2_BUCKET'
          success = failed = 0
          saved_bytes = 0

          data_files = []
          for root, dirs, files in os.walk(split_dir):
              for f in files:
                  if f.endswith('.csv') or f.endswith('.parquet'):
                      data_files.append(os.path.join(root, f))

          data_files.sort()
          total = len(data_files)
          print(f'  Found {total} data files to upload')

          for i, local in enumerate(data_files):
              rel = os.path.relpath(local, split_dir)
              is_parquet = local.endswith('.parquet')
              r2_key = f'{r2_prefix}/{rel}' if is_parquet else f'{r2_prefix}/{rel}.gz'
              try:
                  if is_parquet:
                      upload_path = local
                      content_type = 'application/octet-stream'
                      extra_args = []
                  else:
                      upload_path = local + '.gz'
                      orig_size = os.path.getsize(local)
                      with open(local, 'rb') as f_in:
                          with gz.open(upload_path, 'wb', compresslevel=6) as f_out:
                              shutil.copyfileobj(f_in, f_out)
                      gz_size = os.path.getsize(upload_path)
                      saved_bytes += (orig_size - gz_size)
                      content_type = 'text/csv'
                      extra_args = ['--content-encoding', 'gzip']

                  uploaded = False
                  for attempt in range(1, 5):
                      result = subprocess.run([
                          'aws', 's3', 'cp', upload_path, f's3://{bucket}/{r2_key}',
                          '--endpoint-url', endpoint,
                          '--content-type', content_type,
                          '--only-show-errors'
                      ] + extra_args, capture_output=True, timeout=120)
                      if result.returncode == 0:
                          uploaded = True
                          break
                      import time
                      time.sleep(2 ** attempt)

                  if not is_parquet:
                      os.remove(upload_path)
                  if uploaded:
                      success += 1
                  else:
                      print(f'  FAIL after 4 attempts: {r2_key}')
                      failed += 1
              except Exception as e:
                  print(f'  FAIL: {r2_key}: {e}')
                  failed += 1

              if (i + 1) % 100 == 0 or (i + 1) == total:
                  print(f'  Progress: {i+1}/{total} ({success} ok, {failed} fail)')

          print(f'Upload complete: {success} ok, {failed} fail')
          print(f'  Gzip savings: {saved_bytes / 1024 / 1024:.1f} MB saved')
          if failed > 0:
              sys.exit(1)
          "

      # ── Stage 4.5: Trigger Supabase Sync (webhook on VPS) ──
      - name: "Stage 4.5: Trigger Supabase Sync (webhook)"
        if: github.event.inputs.skip_supabase != 'true' && github.event.inputs.dry_run != 'true'
        run: |
          STATE_ABBR="de"
          echo "Triggering Supabase sync via webhook..."

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://srv1503081.hstgr.cloud/api/sync" \
            -H "Authorization: Bearer ${{ secrets.SYNC_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            --connect-timeout 10 \
            --max-time 30 \
            -d "{\"state\": \"${STATE_ABBR}\", \"batch_size\": 25000}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response: $BODY (HTTP $HTTP_CODE)"

          if [ "$HTTP_CODE" = "202" ]; then
            echo "✅ Sync triggered — VPS will process in background"
            echo "   Check status: curl https://srv1503081.hstgr.cloud/api/sync/status?state=de"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "⚠️ Another sync already running: $BODY"
          else
            echo "❌ Webhook failed (HTTP $HTTP_CODE): $BODY"
            echo "   Pipeline continues — Supabase sync can be triggered manually"
          fi
          # Don't exit 1 — webhook failure shouldn't block the rest of the pipeline

      # ── Stage 5: Predict (Forecasts) ──
      - name: "Stage 5: Generate forecasts"
        if: github.event.inputs.skip_forecasts != 'true' && github.event.inputs.dry_run != 'true'
        timeout-minutes: 60
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          JURISDICTIONS='${{ needs.prepare.outputs.jurisdictions_json }}'

          echo "=========================================="
          echo "Stage 5: Forecast generation (per county only)"
          echo "=========================================="

          SPLIT_DIR="data/$STATE"

          echo "$JURISDICTIONS" | python3 -c "
          import json, sys, subprocess, os
          jurisdictions = json.load(sys.stdin)
          state = '$STATE'
          split_dir = '$SPLIT_DIR'
          success = 0
          for j in jurisdictions:
              data_dir = os.path.join(split_dir, j) if os.path.isdir(os.path.join(split_dir, j)) else '$DATA_DIR'
              cmd = ['python', 'scripts/generate_forecast.py',
                     '--all-road-types', '--jurisdiction', j, '--data-dir', data_dir,
                     '--state', state, '--source', 'r2']
              result = subprocess.run(cmd, capture_output=True)
              if result.returncode == 0:
                  success += 1
              else:
                  print(f'    WARNING: Forecast failed for {j} (non-fatal)')
          print(f'Forecasts: {success}/{len(jurisdictions)} jurisdictions')
          "

      # ── Stage 5b-5d: Upload forecasts (unchanged) ──
      - name: "Stage 5b: Upload forecast JSONs to R2"
        if: github.event.inputs.skip_forecasts != 'true' && github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          DATA_DIR="${{ needs.prepare.outputs.data_dir }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"
          SPLIT_DIR="data/$STATE"

          python3 -c "
          import os, sys, subprocess, gzip as gz, shutil
          split_dir = '$SPLIT_DIR'
          data_dir = '$DATA_DIR'
          r2_prefix = '$R2_PREFIX'
          endpoint = '$R2_ENDPOINT'
          bucket = '$R2_BUCKET'
          uploaded = 0
          forecast_files = []
          for search_dir in [split_dir, data_dir]:
              if not os.path.isdir(search_dir): continue
              for root, dirs, files in os.walk(search_dir):
                  for f in files:
                      if f.startswith('forecasts_') and f.endswith('.json'):
                          forecast_files.append(os.path.join(root, f))
          seen = set()
          for local_path in sorted(forecast_files):
              if local_path.startswith(split_dir):
                  rel = os.path.relpath(local_path, split_dir)
              else:
                  rel = os.path.relpath(local_path, data_dir)
              r2_key = f'{r2_prefix}/{rel}'
              if r2_key in seen: continue
              seen.add(r2_key)
              try:
                  gz_path = local_path + '.gz'
                  with open(local_path, 'rb') as f_in:
                      with gz.open(gz_path, 'wb', compresslevel=6) as f_out:
                          shutil.copyfileobj(f_in, f_out)
                  subprocess.run([
                      'aws', 's3', 'cp', gz_path, f's3://{bucket}/{r2_key}',
                      '--endpoint-url', endpoint,
                      '--content-type', 'application/json',
                      '--content-encoding', 'gzip',
                      '--only-show-errors'
                  ], check=True, capture_output=True, timeout=120)
                  os.remove(gz_path)
                  uploaded += 1
              except Exception as e:
                  print(f'  FAIL: {r2_key}: {e}')
          print(f'Forecast upload: {uploaded} uploaded')
          "

      - name: "Stage 5c: Aggregate forecasts (region + MPO)"
        if: github.event.inputs.skip_forecasts != 'true' && github.event.inputs.dry_run != 'true'
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          SPLIT_DIR="data/$STATE"
          python scripts/aggregate_forecasts.py \
            --state "$STATE" --scope statewide \
            --data-dir "$SPLIT_DIR" --output-dir "$SPLIT_DIR" || {
            echo "WARNING: Forecast aggregation had issues (non-fatal)"
          }

      - name: "Stage 5d: Upload region/MPO forecast JSONs to R2"
        if: github.event.inputs.skip_forecasts != 'true' && github.event.inputs.dry_run != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          R2_PREFIX="${{ needs.prepare.outputs.r2_prefix }}"
          R2_ENDPOINT="https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          R2_BUCKET="crash-lens-data"
          SPLIT_DIR="data/$STATE"
          find "$SPLIT_DIR" \( -path "*/_region/*" -o -path "*/_mpo/*" -o -path "*/_planning_district/*" -o -path "*/_state/*" \) -name "forecasts_*.json" 2>/dev/null | while read f; do
            REL="${f#$SPLIT_DIR/}"
            R2_KEY="$R2_PREFIX/$REL"
            aws s3 cp "$f" "s3://$R2_BUCKET/$R2_KEY" \
              --endpoint-url "$R2_ENDPOINT" --content-type "application/json" \
              --only-show-errors || echo "WARN: failed $R2_KEY"
          done

      # ── Stage 6: Commit ──
      - name: "Stage 6: Commit manifest and metadata"
        if: github.event.inputs.dry_run != 'true'
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          SCOPE="${{ needs.prepare.outputs.scope }}"
          SELECTION="${{ needs.prepare.outputs.selection || 'all' }}"
          JCOUNT="${{ needs.prepare.outputs.jurisdiction_count }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/r2-manifest.json 2>/dev/null || true
          git add data/*/.split_report.json 2>/dev/null || true
          git add data/*/split_manifest.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No metadata changes to commit"
          else
            git commit -m "delaware-pipeline: ${SCOPE}/${SELECTION} — ${JCOUNT} jurisdictions ($(date -u '+%Y-%m-%d'))"
            for i in 1 2 3 4; do
              if git push origin main; then echo "Push succeeded"; break; fi
              sleep $((2 ** i))
              git fetch origin main
              git rebase origin/main || git pull --no-edit origin main
            done
          fi

      # ── Summary ──
      - name: Job summary
        if: always()
        run: |
          STATE="${{ needs.prepare.outputs.state }}"
          SCOPE="${{ needs.prepare.outputs.scope }}"
          SELECTION="${{ needs.prepare.outputs.selection || 'all' }}"
          echo "## Delaware Batch Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| State | Delaware |" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | $SCOPE ($SELECTION) |" >> $GITHUB_STEP_SUMMARY
          echo "| Jurisdictions | ${{ needs.prepare.outputs.jurisdiction_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Source | R2: ${{ github.event.inputs.r2_data_key }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase Sync | Triggered via VPS webhook (Stage 4.5) |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${{ github.event.inputs.dry_run }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stages | R2 → Cache → Split → Upload → Supabase webhook → Predict → Manifest |" >> $GITHUB_STEP_SUMMARY
