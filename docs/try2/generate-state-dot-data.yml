name: Generate State DOT Data

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Scope: single state abbreviation (de, va, md) or "all"'
        required: true
        default: 'de'
        type: string
      force:
        description: 'Force re-download even if cache exists'
        required: false
        default: false
        type: boolean

  # Annual refresh — state DOT inventories update annually
  schedule:
    - cron: '0 6 15 2 *'   # Feb 15 annually

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
  R2_BUCKET: crash-lens-data

jobs:
  # ── Determine which states to process ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          SCOPE="${{ inputs.scope || 'de' }}"

          if [ "$SCOPE" = "all" ]; then
            # Discover all states that have a state_dot config file
            STATES=$(find states -name "*_state_dot.py" -exec basename {} \; | \
                     sed 's/_state_dot.py//' | sort | jq -R . | jq -s .)
          else
            # Single state
            STATES=$(echo "[\"$SCOPE\"]")
          fi

          echo "matrix={\"state\":$STATES}" >> $GITHUB_OUTPUT
          echo "States to process: $STATES"

  # ── Download + normalize per state ──
  generate:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests pandas pyarrow boto3

      - name: Check state config exists
        run: |
          STATE="${{ matrix.state }}"
          # Find the state directory (handles spaces in state names)
          STATE_DIR=$(find states -maxdepth 1 -type d | while read d; do
            if [ -f "$d/${STATE}_state_dot.py" ]; then
              echo "$d"
              break
            fi
          done)

          if [ -z "$STATE_DIR" ]; then
            echo "❌ No config found: states/*/${STATE}_state_dot.py"
            exit 1
          fi
          echo "✅ Found config: $STATE_DIR/${STATE}_state_dot.py"

      - name: Download and normalize
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          python generate_state_dot_data.py \
            --state ${{ matrix.state }} \
            --cache-dir cache \
            --upload \
            --timeout 180 \
            $FORCE_FLAG

      - name: Upload cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-dot-${{ matrix.state }}
          path: cache/${{ matrix.state }}_state_dot.parquet.gz
          retention-days: 30
          if-no-files-found: ignore
